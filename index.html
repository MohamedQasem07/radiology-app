function fmt(n) { return (Number(n) || 0).toLocaleString('ar-EG', { maximumFractionDigits: 2 }) + ' ج.م'; }
function fmtNum(n) { return (Number(n) || 0).toLocaleString('ar-EG'); }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('ar-EG', { year: 'numeric', month: '2-digit', day: '2-digit' }); }
function fmtDateEn(d) { if (!d) return ''; const dt = new Date(d); return String(dt.getDate()).padStart(2,'0')+'.'+String(dt.getMonth()+1).padStart(2,'0')+'.'+dt.getFullYear(); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function findClient(id) { return appData.clients.find(h => h.id === id); }
function findService(id) { return appData.services.find(s => s.id === id); }
function findPrice(clientId, serviceId) { return appData.prices.find(p => p.client_id === clientId && p.service_id === serviceId); }
function clientTypeLabel(code) { const t = HOSPITAL_TYPES.find(x => x.code === code); return t ? t.labelAr : '—'; }
function patientTypeLabel(code) { const t = PATIENT_TYPES.find(x => x.code === code); return t ? t.labelAr : '—'; }
function caseAmount(c) { return Number(c.price) || 0; }

function can(perm) {
  if (!profile) return false;
  if (profile.is_admin) return true;
  return !!profile[perm];
}
function isClientPortal() { return profile && profile.linked_client_id; }
function showLoading(s) { document.getElementById('full-loading').hidden = !s; }

function clientDue(clientId, dateFrom = null, dateTo = null, includeOpening = true) {
  const h = findClient(clientId);
  const opening = includeOpening ? (Number(h?.opening_balance) || 0) : 0;
  let cases = appData.cases.filter(c => c.client_id === clientId && !c.cash_direct);
  let payments = appData.payments.filter(p => p.client_id === clientId);
  if (dateFrom) { cases = cases.filter(c => (c.case_date||'') >= dateFrom); payments = payments.filter(p => (p.payment_date||'') >= dateFrom); }
  if (dateTo)   { cases = cases.filter(c => (c.case_date||'') <= dateTo);   payments = payments.filter(p => (p.payment_date||'') <= dateTo); }
  const earned = cases.reduce((s, c) => s + caseAmount(c), 0);
  const paid = payments.reduce((s, p) => s + (Number(p.amount) || 0), 0);
  return { opening, earned, paid, due: opening + earned - paid, cases, payments };
}

function clientCashDirect(clientId, dateFrom = null, dateTo = null) {
  let cases = appData.cases.filter(c => c.client_id === clientId && c.cash_direct);
  if (dateFrom) cases = cases.filter(c => (c.case_date||'') >= dateFrom);
  if (dateTo)   cases = cases.filter(c => (c.case_date||'') <= dateTo);
  return { cases, amount: cases.reduce((s, c) => s + caseAmount(c), 0) };
}

function lastActivityDate(clientId) {
  const lastCase = appData.cases.filter(c => c.client_id === clientId).sort((a,b) => (b.case_date||'').localeCompare(a.case_date||''))[0];
  const lastPayment = appData.payments.filter(p => p.client_id === clientId).sort((a,b) => (b.payment_date||'').localeCompare(a.payment_date||''))[0];
  const dates = [lastCase?.case_date, lastPayment?.payment_date].filter(Boolean);
  return dates.length ? dates.sort().reverse()[0] : null;
}

function daysSince(d) { if (!d) return null; const diff = Date.now() - new Date(d).getTime(); return Math.floor(diff / (1000*60*60*24)); }

function toast(msg, type = 'success') {
  const cont = document.getElementById('toast-container');
  const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-sky-600', warn: 'bg-amber-600' };
  const el = document.createElement('div');
  el.className = `toast-box ${colors[type]} text-white px-4 py-2 rounded-lg shadow-lg text-sm`;
  el.textContent = msg;
  cont.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function openModal(title, contentHtml, onSave, opts = {}) {
  const cont = document.getElementById('modal-container');
  cont.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width:${opts.width || '700px'}">
        <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-200">
          <h3 class="text-lg font-bold text-slate-800">${escapeHtml(title)}</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">&times;</button>
        </div>
        <div id="modal-body">${contentHtml}</div>
        ${onSave ? `<div class="flex gap-2 justify-end mt-6 pt-4 border-t border-slate-200">
          <button onclick="closeModal()" class="btn btn-secondary">إلغاء</button>
          <button id="modal-save-btn" class="btn ${opts.saveClass || 'btn-primary'}">${escapeHtml(opts.saveLabel || 'حفظ')}</button>
        </div>` : `<div class="flex justify-end mt-6 pt-4 border-t border-slate-200"><button onclick="closeModal()" class="btn btn-secondary">إغلاق</button></div>`}
      </div>
    </div>`;
  if (onSave) {
    document.getElementById('modal-save-btn').onclick = async () => {
      const btn = document.getElementById('modal-save-btn');
      btn.disabled = true;
      try {
        const ok = await onSave();
        if (ok !== false) closeModal();
      } catch (e) {
        toast('خطأ: ' + (e.message || e), 'error');
      } finally {
        if (btn) btn.disabled = false;
      }
    };
  }
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
function confirmAction(msg, cb) {
  openModal('تأكيد', `<p class="text-slate-700">${escapeHtml(msg)}</p>`, async () => { await cb(); return true; }, { saveLabel: 'تأكيد', saveClass: 'btn-danger' });
}

async function checkSession() {
  showLoading(true);
  try {
    const { data } = await supa.auth.getSession();
    session = data.session;
    if (session) {
      await loadProfile();
      if (!profile) { await handleLogout(); return; }
      await loadAllData();
      showApp();
    } else {
      await loadPublicSettings();
      showLoginScreen();
    }
  } catch (e) {
    console.error(e);
    showLoginScreen();
  } finally {
    showLoading(false);
  }
}

async function loadPublicSettings() {
  // Fetch app_settings as anon to show login background
  try {
    const { data } = await supa.from('app_settings').select('*').eq('id', 1).maybeSingle();
    if (data) {
      appData.settings = data;
      applyLoginBranding();
    }
  } catch (e) { console.warn('Could not load public settings:', e); }
}

function applyLoginBranding() {
  const s = appData.settings || {};
  if (s.login_title) document.getElementById('login-title').textContent = s.login_title;
  if (s.login_subtitle) document.getElementById('login-subtitle').textContent = s.login_subtitle;
  if (s.login_bg_url) {
    const bg = document.getElementById('login-bg-image');
    bg.style.backgroundImage = `url('${s.login_bg_url}')`;
    bg.style.backgroundColor = '#0c4a6e';
  }
}

function togglePassword(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-submit-btn');
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  btn.disabled = true;
  document.getElementById('login-btn-text').innerHTML = '<span class="spinner"></span> جارٍ التحقق...';

  try {
    console.log('[Login] Attempting sign-in for:', email);
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) {
      console.error('[Login] Auth error:', error);
      throw error;
    }
    console.log('[Login] Auth OK, loading profile...');
    session = data.session;

    await loadProfile();
    if (!profile) {
      console.error('[Login] No profile found for user', session.user.id);
      errEl.textContent = '❌ لا يوجد ملف تعريف. شغّل SQL setup مرة أخرى من Supabase.';
      await supa.auth.signOut();
      return;
    }
    if (!profile.active) {
      errEl.textContent = '⛔ هذا الحساب موقوف. تواصل مع المسؤول.';
      await supa.auth.signOut();
      return;
    }
    console.log('[Login] Profile loaded, role:', profile.role, 'admin:', profile.is_admin);

    try {
      await loadAllData();
    } catch (e) {
      console.error('[Login] Data load error:', e);
      errEl.textContent = '⚠️ خطأ في تحميل البيانات: ' + e.message;
      return;
    }

    console.log('[Login] All data loaded, showing app');
    showApp();
  } catch (err) {
    console.error('[Login] Failed:', err);
    let msg = err.message || String(err);
    if (msg === 'Invalid login credentials') msg = '❌ البريد أو كلمة المرور غير صحيحة';
    else if (msg.includes('Email logins are disabled')) msg = '⚠️ Email Provider مقفول في Supabase — فعّله من Authentication → Providers → Email';
    else if (msg.includes('Email not confirmed')) msg = '⚠️ البريد لم يتم تأكيده — اعمل Auto Confirm من Supabase Auth → Users → اضغط على المستخدم → Confirm email';
    else msg = '❌ ' + msg;
    errEl.textContent = msg;
  } finally {
    btn.disabled = false;
    document.getElementById('login-btn-text').textContent = 'تسجيل الدخول';
  }
}

async function handleLogout() {
  await supa.auth.signOut();
  session = null; profile = null;
  appData = { clients:[], services:[], prices:[], cases:[], payments:[], expenses:[], profiles:[], settings:{} };
  showLoginScreen();
}

async function loadProfile() {
  if (!session) { profile = null; return; }
  const { data, error } = await supa.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
  if (error) { console.error(error); profile = null; return; }
  profile = data;
}

async function showResetPassword(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) { toast('اكتب بريدك الإلكتروني أولاً', 'warn'); return; }
  const { error } = await supa.auth.resetPasswordForEmail(email);
  if (error) toast('خطأ: ' + error.message, 'error');
  else toast('تم إرسال رابط إعادة التعيين إلى بريدك ✓', 'success');
}

async function loadAllData() {
  showLoading(true);
  try {
    const [clients, services, prices, settings, cases, payments, expenses, profiles, expenseCats, paymentMethods] = await Promise.all([
      supa.from('clients').select('*').order('name'),
      supa.from('services').select('*').order('sort_order').order('name'),
      supa.from('prices').select('*'),
      supa.from('app_settings').select('*').eq('id', 1).maybeSingle(),
      supa.from('cases').select('*').order('case_date', { ascending: false }),
      supa.from('payments').select('*').order('payment_date', { ascending: false }),
      supa.from('expenses').select('*').order('expense_date', { ascending: false }),
      supa.from('profiles').select('*').order('full_name'),
      supa.from('expense_categories').select('*').eq('active', true).order('sort_order').order('name'),
      supa.from('payment_methods').select('*').eq('active', true).order('sort_order').order('name'),
    ]);
    appData.clients = clients.data || [];
    appData.services = services.data || [];
    appData.prices = prices.data || [];
    appData.settings = settings.data || {};
    appData.cases = cases.data || [];
    appData.payments = payments.data || [];
    appData.expenses = expenses.data || [];
    appData.profiles = profiles.data || [];
    appData.expense_categories = expenseCats.data || [];
    appData.payment_methods = paymentMethods.data || [];
  } catch (e) {
    console.error(e);
    toast('خطأ في تحميل البيانات: ' + e.message, 'error');
  } finally {
    showLoading(false);
  }
}

async function reloadTable(table) {
  const orderBy = { cases: 'case_date', payments: 'payment_date', expenses: 'expense_date', services: 'sort_order', clients: 'name', profiles: 'full_name', prices: 'id', expense_categories: 'sort_order', payment_methods: 'sort_order' }[table];
  const ascending = ['services','clients','profiles','prices','expense_categories','payment_methods'].includes(table);
  const { data } = await supa.from(table).select('*').order(orderBy, { ascending });
  appData[table] = data || [];
}

function dateRangeFromFilter(filter) {
  const today = todayISO();
  if (filter.period === 'all') return { from: null, to: null };
  if (filter.period === 'today') return { from: today, to: today };
  if (filter.period === 'week') { const d = new Date(); d.setDate(d.getDate() - 7); return { from: d.toISOString().split('T')[0], to: today }; }
  if (filter.period === 'month') return { from: today.slice(0, 7) + '-01', to: today };
  if (filter.period === 'year') return { from: today.slice(0, 4) + '-01-01', to: today };
  if (filter.period === 'custom') return { from: filter.from || null, to: filter.to || null };
  return { from: null, to: null };
}

function renderDashboardCharts() {
  // Income last 6 months
  const months = [];
  const today = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    months.push({ key: d.toISOString().slice(0, 7), label: d.toLocaleDateString('ar-EG', { month: 'short', year: 'numeric' }) });
  }
  const incomeData = months.map(m => appData.cases.filter(c => (c.case_date||'').startsWith(m.key)).reduce((s, c) => s + caseAmount(c), 0));
  const expenseData = months.map(m => appData.expenses.filter(e => (e.expense_date||'').startsWith(m.key)).reduce((s, e) => s + (Number(e.amount) || 0), 0));

  const ctx1 = document.getElementById('chart-income');
  if (ctx1) {
    chartInstances.income = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: months.map(m => m.label),
        datasets: [
          { label: 'الدخل', data: incomeData, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', tension: 0.3, fill: true },
          { label: 'المصاريف', data: expenseData, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', tension: 0.3, fill: true },
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
    });
  }

  // Services distribution
  const serviceMap = {};
  appData.cases.forEach(c => {
    const s = findService(c.service_id);
    const key = s?.name || 'غير محدد';
    serviceMap[key] = (serviceMap[key] || 0) + 1;
  });
  const sortedSvc = Object.entries(serviceMap).sort((a, b) => b[1] - a[1]).slice(0, 8);

  const ctx2 = document.getElementById('chart-services');
  if (ctx2) {
    chartInstances.services = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: sortedSvc.map(s => s[0]),
        datasets: [{
          data: sortedSvc.map(s => s[1]),
          backgroundColor: ['#0ea5e9','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f43f5e']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
  }
}

function updatePriceFromForm() {

  const price = findPrice(hId, sId);

}

  e.preventDefault();
  const submitBtn = e.target.querySelector('button[type="submit"]');

  try {

    const data = {
      case_date: document.getElementById('nc-date').value,
      client_id: document.getElementById('nc-client').value || null,
      service_id: document.getElementById('nc-service').value || null,
      patient_name: document.getElementById('nc-patient').value.trim(),
      date_of_birth: document.getElementById('nc-dob').value || null,
      nationality: document.getElementById('nc-nationality').value.trim() || null,
      patient_type: document.getElementById('nc-type').value,
      price: Number(document.getElementById('nc-price').value) || 0,
      cash_direct: cashDirect,
      notes: document.getElementById('nc-notes').value.trim() || null,
    };
    console.log('[saveCase] Inserting:', data);
    const { error } = await supa.from('cases').insert(data);
    if (error) {
      console.error('[saveCase] Supabase error:', error);
      throw error;
    }
    await reloadTable('cases');
    refreshPatientsDatalist();
    toast('تم حفظ الحالة ✓');
    switchTab('cases');
  } catch (e) {
    const detail = e.details || e.hint || e.code || '';
    toast('خطأ: ' + (e.message || 'unknown') + (detail ? ' (' + detail + ')' : ''), 'error');
  }
  finally { submitBtn.disabled = false; }
}

function renderCases() {
  let filtered = [...appData.cases];
  const f = ui.casesFilter;
  if (f.client)   filtered = filtered.filter(c => c.client_id === f.client);
  if (f.from)     filtered = filtered.filter(c => (c.case_date || '') >= f.from);
  if (f.to)       filtered = filtered.filter(c => (c.case_date || '') <= f.to);
  if (f.cashOnly === 'cash') filtered = filtered.filter(c => c.cash_direct);
  if (f.cashOnly === 'hosp') filtered = filtered.filter(c => !c.cash_direct);
  if (f.ptype)    filtered = filtered.filter(c => c.patient_type === f.ptype);
  if (f.search) {
    const q = f.search.toLowerCase();
    filtered = filtered.filter(c => (c.patient_name || '').toLowerCase().includes(q) || (c.nationality || '').toLowerCase().includes(q));
  }
  filtered.sort((a, b) => (b.case_date || '').localeCompare(a.case_date || ''));
  const totalAmount = filtered.reduce((s, c) => s + caseAmount(c), 0);

  return `
    <div class="space-y-4">
      <div class="card no-print">
        <div class="flex items-center justify-between flex-wrap gap-3 mb-3">
          <h2 class="text-lg font-bold text-slate-800">📋 الحالات (${filtered.length})</h2>
          ${can('perm_add_case') ? `<button onclick="switchTab('newcase')" class="btn btn-primary">➕ حالة جديدة</button>` : ''}
        </div>
        <div class="grid grid-cols-2 md:grid-cols-6 gap-2 mb-3">
          <input type="text" placeholder="🔍 بحث (اسم/جنسية)" oninput="ui.casesFilter.search=this.value; render()" value="${escapeHtml(f.search)}">
          <select onchange="ui.casesFilter.client=this.value; render()">
            <option value="">كل العملاء</option>
            ${appData.clients.map(h => `<option value="${h.id}" ${f.client===h.id?'selected':''}>${escapeHtml(h.name)}</option>`).join('')}
          </select>
          <select onchange="ui.casesFilter.ptype=this.value; render()">
            <option value="">كل الأنواع</option>
            ${PATIENT_TYPES.map(t => `<option value="${t.code}" ${f.ptype===t.code?'selected':''}>${t.labelAr}</option>`).join('')}
          </select>
          <select onchange="ui.casesFilter.cashOnly=this.value; render()">
            <option value="">كل المصادر</option>
            <option value="cash" ${f.cashOnly==='cash'?'selected':''}>💵 كاش مباشر</option>
            <option value="hosp" ${f.cashOnly==='hosp'?'selected':''}>🏥 من العميل</option>
          </select>
          <input type="date" onchange="ui.casesFilter.from=this.value; render()" value="${f.from}" title="من">
          <input type="date" onchange="ui.casesFilter.to=this.value; render()" value="${f.to}" title="إلى">
        </div>
        <div class="flex justify-between items-center">
          <button onclick="ui.casesFilter={client:'',from:'',to:'',search:'',cashOnly:'',ptype:''}; render()" class="text-xs text-sky-600 hover:underline">مسح الفلاتر</button>
          <div class="text-sm text-slate-700">إجمالي قيمة الحالات الظاهرة: <strong class="text-emerald-700">${fmt(totalAmount)}</strong></div>
        </div>
      </div>

      <div class="card overflow-x-auto">
        ${filtered.length === 0 ? `<p class="text-slate-500 text-center py-6">لا توجد نتائج</p>` :
        `<table>
          <thead><tr><th>التاريخ</th><th>المريض</th><th>الجنسية</th><th>النوع</th><th>العميل</th><th>الخدمة</th><th>السعر</th><th>المصدر</th><th>تقرير</th><th></th></tr></thead>
          <tbody>
            ${filtered.map(c => `
              <tr>
                <td>${fmtDate(c.case_date)}</td>
                <td class="font-semibold">${escapeHtml(c.patient_name || '')}</td>
                <td class="text-xs">${escapeHtml(c.nationality || '—')}</td>
                <td>${patientTypeLabel(c.patient_type)}</td>
                <td>${escapeHtml(findClient(c.client_id)?.name || '?')}</td>
                <td>${escapeHtml(findService(c.service_id)?.name || '?')}</td>
                <td class="font-bold">${fmt(caseAmount(c))}</td>
                <td>${c.cash_direct ? '<span class="badge badge-green">💵</span>' : '<span class="badge badge-blue">🏥</span>'}</td>
                <td>
                  ${can('perm_write_report') || can('perm_edit_report') || can('perm_view_own_reports') ?
                    `<button onclick="openReportChooser('${c.id}')" class="text-xl hover:scale-110 transition" title="${c.report ? 'تقرير موجود' : 'إنشاء تقرير'}">${c.report ? '📄✓' : '📄'}</button>` : '—'}
                </td>
                <td class="whitespace-nowrap">
                  ${can('perm_edit_case') ? `<button onclick="editCase('${c.id}')" class="text-sky-600 hover:underline text-sm">تعديل</button>` : ''}

function openReportChooser(caseId) {
  const c = appData.cases.find(x => x.id === caseId);
  if (!c) return;
  const currentService = findService(c.service_id);
  const hasExisting = !!c.report;

  const otherServicesOptions = appData.services
    .filter(s => s.id !== currentService?.id)
    .map(s => `<option value="${s.id}">${escapeHtml(s.name)}${s.name_en ? ' — ' + escapeHtml(s.name_en) : ''}</option>`)
    .join('');

  const body = `
    <div class="space-y-3">
      <div class="bg-sky-50 p-3 rounded-lg text-sm border border-sky-200">
        <strong>المريض:</strong> ${escapeHtml(c.patient_name)} | <strong>الخدمة:</strong> ${escapeHtml(currentService?.name || '?')}
      </div>
      ${hasExisting ? `
        <button onclick="writeReport('${caseId}', 'existing')" class="chooser-card existing">
          <div class="font-bold text-emerald-800">✏️ متابعة تعديل التقرير الحالي</div>
          <div class="text-xs text-slate-600 mt-1">التقرير مكتوب — افتحه للتعديل أو الطباعة</div>
        </button>
      ` : ''}
      ${currentService?.template?.sections?.length > 0 ? `
        <button onclick="writeReport('${caseId}', 'service:${currentService.id}')" class="chooser-card">
          <div class="font-bold">📋 قالب الخدمة: ${escapeHtml(currentService.name)}</div>
          <div class="text-xs text-slate-600 mt-1">القالب الافتراضي للخدمة</div>
        </button>
      ` : ''}
      <div class="border-2 border-slate-200 rounded-lg p-3 bg-white">
        <div class="font-semibold mb-2 text-sm">📑 قالب خدمة أخرى:</div>
        <select id="chooser-other-service" class="mb-2"><option value="">-- اختر --</option>${otherServicesOptions}</select>
        <button onclick="useOtherTemplate('${caseId}')" class="btn btn-primary w-full" style="width:100%;">افتح القالب</button>
      </div>
      <button onclick="writeReport('${caseId}', 'blank')" class="chooser-card" style="border-color:#fbbf24; background:#fffbeb;">
        <div class="font-bold" style="color:#854d0e;">📝 قالب فارغ</div>
        <div class="text-xs text-slate-600 mt-1">ابدأ من الصفر</div>
      </button>
    </div>`;
  openModal('📄 اختر نمط التقرير', body, null, { width: '600px' });
}

function useOtherTemplate(caseId) {
  const sel = document.getElementById('chooser-other-service');
  if (!sel || !sel.value) { toast('اختر خدمة', 'warn'); return; }
  writeReport(caseId, 'service:' + sel.value);
}

function writeReport(caseId, source) {
  const c = appData.cases.find(x => x.id === caseId);
  if (!c) return;
  const h = findClient(c.client_id);

  let report;
  if (source === 'existing' && c.report) {
    report = JSON.parse(JSON.stringify(c.report));
  } else if (source === 'blank') {
    report = { title: '', sections: [{ heading: '', content: '' }], conclusion: '' };
  } else if (source && source.startsWith('service:')) {
    const sid = source.slice('service:'.length);
    const s = findService(sid);
    report = s?.template ? JSON.parse(JSON.stringify(s.template)) : { title: '', sections: [], conclusion: '' };
  } else {
    report = { title: '', sections: [], conclusion: '' };
  }

  const sectionsHtml = (report.sections || []).map((sec, i) => `
    <div class="mb-3" data-idx="${i}">
      <input type="text" class="sec-heading-edit" data-field="heading" value="${escapeHtml(sec.heading)}">
      <textarea class="sec-content-edit" data-field="content" rows="5">${escapeHtml(sec.content)}</textarea>
    </div>`).join('');

  const canEdit = can('perm_write_report') || can('perm_edit_report');
  const readOnly = !canEdit;

  const body = `
    <div class="space-y-3">
      <div class="bg-sky-50 p-3 rounded-lg text-sm border border-sky-200">
        <strong>المريض:</strong> ${escapeHtml(c.patient_name)} | <strong>العميل:</strong> ${escapeHtml(h?.name || '?')}
      </div>
      <div class="report-edit">
        <div class="mb-3"><label>عنوان التقرير</label><input type="text" id="rpt-title" value="${escapeHtml(report.title || '')}" style="direction:ltr; text-align:left; font-weight:bold; font-size:15px" ${readOnly ? 'readonly' : ''}></div>
        <div id="rpt-sections">${sectionsHtml}</div>
        ${canEdit ? `<button type="button" onclick="addReportSection()" class="btn btn-secondary mb-3">➕ إضافة قسم</button>` : ''}
        <div><label>CONCLUSION</label><textarea id="rpt-conclusion" rows="4" style="direction:ltr; text-align:left; font-family:'Times New Roman',serif" ${readOnly ? 'readonly' : ''}>${escapeHtml(report.conclusion || '')}</textarea></div>
      </div>
      <div class="flex gap-2 justify-end pt-3 border-t border-slate-200">
        <button type="button" onclick="printReport('${caseId}', ${canEdit})" class="btn btn-primary">🖨️ ${canEdit ? 'حفظ و' : ''}طباعة / PDF</button>
      </div>
    </div>`;

  openModal('✍️ التقرير', body, canEdit ? async () => {
    const saved = collectReportFromDom();
    const { error } = await supa.from('cases').update({ report: saved }).eq('id', c.id);
    if (error) throw error;
    await reloadTable('cases');
    render();
    toast('تم حفظ التقرير ✓');
  } : null, { saveLabel: '💾 حفظ', width: '880px' });
}

function collectReportFromDom() {
  const title = document.getElementById('rpt-title').value;
  const conclusion = document.getElementById('rpt-conclusion').value;
  const sections = [];
  document.querySelectorAll('#rpt-sections > [data-idx]').forEach(div => {
    const heading = div.querySelector('[data-field="heading"]')?.value || '';
    const content = div.querySelector('[data-field="content"]')?.value || '';
    if (heading || content) sections.push({ heading, content });
  });
  return { title, sections, conclusion };
}

function addReportSection() {
  const container = document.getElementById('rpt-sections');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'mb-3';
  div.setAttribute('data-idx', idx);
  div.innerHTML = `
    <div class="flex gap-2 items-start">
      <div class="flex-1">
        <input type="text" class="sec-heading-edit" data-field="heading" placeholder="عنوان القسم">
        <textarea class="sec-content-edit" data-field="content" rows="4" placeholder="المحتوى"></textarea>
      </div>
      <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 hover:underline text-sm">حذف</button>
    </div>`;
  container.appendChild(div);
}

function addPayment(existing = null) {

  const defaultMethod = methods[0] || '';
  const p = existing || { payment_date: todayISO(), client_id: '', amount: 0, method: defaultMethod, notes: '' };
  const methodsHtml = methods.length > 0

async function downloadStatementPdf() {
  const el = document.getElementById('stmt-doc');
  if (!el) { toast('اختر عميل أولاً', 'warn'); return; }

  // Lazy-load html2pdf
  if (!window.html2pdf) {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    document.head.appendChild(s);
    await new Promise(res => s.onload = res);
  }

  showLoading(true);
  try {
    const clientName = document.querySelector('#stmt-client option:checked')?.textContent || 'statement';
    const filename = `Statement_${clientName.replace(/\s+/g, '_')}_${todayISO()}.pdf`;
    await html2pdf().set({
      margin: [10, 10, 10, 10], filename,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(el).save();
    toast('تم تحميل PDF ✓');
  } catch (e) { toast('خطأ: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

function renderClientsPage() {
  const stats = appData.clients.map(h => {
    const cases = appData.cases.filter(c => c.client_id === h.id);
    const due = clientDue(h.id);
    const cashInfo = clientCashDirect(h.id);
    const last = lastActivityDate(h.id);
    const avgCase = cases.length ? cases.reduce((s, c) => s + caseAmount(c), 0) / cases.length : 0;
    return {
      client: h,
      casesCount: cases.length,
      cashCount: cases.filter(c => c.cash_direct).length,
      ...due,
      cashAmount: cashInfo.amount,
      lastActivity: last,
      daysOverdue: due.due > 0 && last ? daysSince(last) : null,
      avgCase,
    };
  }).sort((a, b) => b.earned - a.earned);

function renderClientsCharts() {
  const stats = appData.clients.map(h => {
    const cases = appData.cases.filter(c => c.client_id === h.id);
    const total = cases.reduce((s, c) => s + caseAmount(c), 0);
    return { name: h.name, total, count: cases.length };
  }).sort((a, b) => b.total - a.total).slice(0, 10);

  const ctx1 = document.getElementById('chart-top-clients');
  if (ctx1) {
    chartInstances.topClients = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: stats.map(s => s.name),
        datasets: [{ label: 'الإيراد (ج.م)', data: stats.map(s => s.total), backgroundColor: '#0ea5e9', borderRadius: 6 }]
      },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  const ctx2 = document.getElementById('chart-clients-cases');
  if (ctx2) {
    chartInstances.clientsCases = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: stats.map(s => s.name),
        datasets: [{ label: 'عدد الحالات', data: stats.map(s => s.count), backgroundColor: '#10b981', borderRadius: 6 }]
      },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}

async function saveMyProfile() {
  const name = document.getElementById('me-name').value.trim();
  if (!name) { toast('الاسم مطلوب', 'error'); return; }
  const { error } = await supa.from('profiles').update({ full_name: name }).eq('id', profile.id);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  profile.full_name = name;
  applyAppBranding();
  toast('تم الحفظ ✓');
}

async function changeMyPassword() {
  const p1 = document.getElementById('me-pwd1').value;
  const p2 = document.getElementById('me-pwd2').value;
  if (p1.length < 6) { toast('كلمة المرور يجب 6 أحرف على الأقل', 'error'); return; }
  if (p1 !== p2) { toast('كلمتا المرور غير متطابقتين', 'error'); return; }
  const { error } = await supa.auth.updateUser({ password: p1 });
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  document.getElementById('me-pwd1').value = '';
  document.getElementById('me-pwd2').value = '';
  toast('تم تحديث كلمة المرور ✓');
}

    const data = {
      name, type: document.getElementById('h-type').value,
      opening_balance: Number(document.getElementById('h-opening').value) || 0,
      phone: document.getElementById('h-phone').value.trim() || null,
      contact_person: document.getElementById('h-person').value.trim() || null,
      notes: document.getElementById('h-notes').value.trim() || null,

      : await supa.from('clients').insert(data);

    await reloadTable('clients');

    render();
    toast('تم الحذف ✓');
  });
}

async function updatePrice(id, field, value) {
  const update = { [field]: Number(value) || 0 };
  const { error } = await supa.from('prices').update(update).eq('id', id);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  // Update local cache
  const p = appData.prices.find(x => x.id === id);
  if (p) p[field] = update[field];
}

function bulkEditPrices(clientId) {
  const h = findClient(clientId);
  if (!h) return;
  const body = `
    <div class="space-y-3">
      <p class="text-sm text-slate-700">القيم هتتطبق على <strong>كل الخدمات</strong> في <strong>${escapeHtml(h.name)}</strong>. اترك الحقل فارغاً لعدم التغيير.</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div><label>سعر مصري</label><input type="number" step="0.01" id="b-pe"></div>
        <div><label>سعر أجنبي</label><input type="number" step="0.01" id="b-pf"></div>
        <div><label>سعر مقيم</label><input type="number" step="0.01" id="b-pr"></div>
      </div>
    </div>`;
  openModal('⚡ تعديل جماعي', body, async () => {
    const pe = document.getElementById('b-pe').value;
    const pf = document.getElementById('b-pf').value;
    const pr = document.getElementById('b-pr').value;
    const update = {};
    if (pe !== '') update.price_egyptian = Number(pe) || 0;
    if (pf !== '') update.price_foreign = Number(pf) || 0;
    if (pr !== '') update.price_resident = Number(pr) || 0;
    if (Object.keys(update).length === 0) { toast('لم تدخل أي قيمة', 'warn'); return false; }
    const { error } = await supa.from('prices').update(update).eq('client_id', clientId);
    if (error) throw error;
    await reloadTable('prices');
    render();
    toast('تم التحديث ✓');
  });
}

function editTemplate(serviceId) {
  const s = findService(serviceId);
  if (!s) return;
  const t = s.template || { title: '', sections: [], conclusion: '' };
  const sectionsHtml = (t.sections || []).map((sec, i) => `
    <div class="mb-3 p-3 border border-slate-200 rounded-lg" data-idx="${i}">
      <div class="flex justify-between items-center mb-2 gap-2">
        <input type="text" class="sec-heading-edit" data-field="heading" value="${escapeHtml(sec.heading || '')}" style="flex:1">
        <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 text-sm">حذف</button>
      </div>
      <textarea class="sec-content-edit" data-field="content" rows="5">${escapeHtml(sec.content || '')}</textarea>
    </div>`).join('');

  const body = `
    <div class="report-edit space-y-3">
      <div><label>عنوان التقرير</label><input type="text" id="tpl-title" value="${escapeHtml(t.title || '')}" style="direction:ltr; text-align:left; font-weight:bold"></div>
      <div>
        <label>الأقسام</label>
        <div id="tpl-sections">${sectionsHtml}</div>
        <button type="button" onclick="addTplSection()" class="btn btn-secondary mt-2">➕ إضافة قسم</button>
      </div>
      <div><label>CONCLUSION</label><textarea id="tpl-conclusion" rows="4" style="direction:ltr; text-align:left; font-family:'Times New Roman',serif">${escapeHtml(t.conclusion || '')}</textarea></div>
    </div>`;
  openModal(`تعديل قالب: ${s.name}`, body, async () => {
    const sections = [];
    document.querySelectorAll('#tpl-sections > [data-idx]').forEach(div => {
      const heading = div.querySelector('[data-field="heading"]')?.value || '';
      const content = div.querySelector('[data-field="content"]')?.value || '';
      if (heading || content) sections.push({ heading, content });
    });
    const template = { title: document.getElementById('tpl-title').value, sections, conclusion: document.getElementById('tpl-conclusion').value };
    const { error } = await supa.from('services').update({ template }).eq('id', serviceId);
    if (error) throw error;
    await reloadTable('services');
    render();
    toast('تم حفظ القالب ✓');
  }, { width: '880px' });
}

function addTplSection() {
  const container = document.getElementById('tpl-sections');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'mb-3 p-3 border border-slate-200 rounded-lg';
  div.setAttribute('data-idx', idx);
  div.innerHTML = `
    <div class="flex justify-between items-center mb-2 gap-2">
      <input type="text" class="sec-heading-edit" data-field="heading" placeholder="عنوان القسم" style="flex:1">
      <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 text-sm">حذف</button>
    </div>
    <textarea class="sec-content-edit" data-field="content" rows="5" placeholder="المحتوى"></textarea>`;
  container.appendChild(div);
}

function addLookup(table, existing = null) {
  const labelMap = { expense_categories: 'فئة مصروف', payment_methods: 'طريقة دفع' };
  const item = existing || { name: '', sort_order: (appData[table].length || 0) + 1 };
  const body = `
    <div class="space-y-3">
      <div><label>الاسم *</label><input type="text" id="lk-name" value="${escapeHtml(item.name)}"></div>
      <div><label>الترتيب</label><input type="number" id="lk-order" value="${item.sort_order || 0}"></div>
    </div>`;
  openModal(existing ? `تعديل ${labelMap[table]}` : `إضافة ${labelMap[table]}`, body, async () => {
    const name = document.getElementById('lk-name').value.trim();
    if (!name) { toast('الاسم مطلوب', 'error'); return false; }
    const data = { name, sort_order: Number(document.getElementById('lk-order').value) || 0 };
    const { error } = existing
      ? await supa.from(table).update(data).eq('id', existing.id)
      : await supa.from(table).insert(data);
    if (error) { console.error('[lookup] error:', error); throw error; }
    await reloadTable(table);
    render();
    toast(existing ? 'تم التحديث ✓' : 'تم الإضافة ✓');
  });
}

function editLookup(table, id) {
  const item = appData[table].find(x => x.id === id);
  if (item) addLookup(table, item);
}

function deleteLookup(table, id) {
  confirmAction('حذف هذا العنصر؟', async () => {
    const { error } = await supa.from(table).delete().eq('id', id);
    if (error) throw error;
    await reloadTable(table);
    render();
    toast('تم الحذف ✓');
  });
}

function addUser(existing = null) {
  if (!existing) {
    // New user — create via signUp
    const body = `
      <div class="space-y-3">
        <div class="bg-sky-50 border border-sky-200 rounded p-3 text-sm text-slate-700">
          هتنشئ المستخدم بـ بريد + باسورد. هيقدر يدخل البرنامج فوراً ويغيّر الباسورد من بياناته.
        </div>
        <div><label>الاسم *</label><input type="text" id="nu-name"></div>
        <div><label>البريد الإلكتروني *</label><input type="email" id="nu-email" dir="ltr"></div>
        <div><label>كلمة المرور المؤقتة *</label><input type="text" id="nu-password" placeholder="6 أحرف على الأقل"></div>
        <div><label>الدور</label>
          <select id="nu-role">
            ${Object.keys(ROLE_LABELS).filter(k => k !== 'owner').map(k => `<option value="${k}">${ROLE_LABELS[k]}</option>`).join('')}
          </select>
        </div>
        <div id="nu-client-wrap" style="display:none;">
          <label>اربط بعميل (لـ Client Portal)</label>
          <select id="nu-client">
            <option value="">-- اختر العميل --</option>
            ${appData.clients.map(h => `<option value="${h.id}">${escapeHtml(h.name)}</option>`).join('')}
          </select>
        </div>
      </div>`;
    openModal('➕ إضافة مستخدم جديد', body, async () => {
      const name = document.getElementById('nu-name').value.trim();
      const email = document.getElementById('nu-email').value.trim();
      const password = document.getElementById('nu-password').value;
      const role = document.getElementById('nu-role').value;
      const linkedClient = document.getElementById('nu-client').value || null;

      if (!name || !email || password.length < 6) { toast('املأ كل الحقول (الباسورد 6 أحرف+)', 'error'); return false; }
      if (role === 'client' && !linkedClient) { toast('اختر العميل المرتبط', 'error'); return false; }

      // Use a temporary client so admin's session isn't affected
      const tempClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false, storage: { getItem: () => null, setItem: () => {}, removeItem: () => {} } }
      });
      const { data, error } = await tempClient.auth.signUp({ email, password, options: { data: { full_name: name } } });
      if (error) throw error;
      if (!data.user) { toast('فشل إنشاء المستخدم', 'error'); return false; }

      // The trigger auto-creates a profile. Now update with role + perms + linked_client
      const updates = { full_name: name, role, ...ROLE_PRESETS[role], linked_client_id: linkedClient };
      // Wait briefly for trigger to complete
      await new Promise(r => setTimeout(r, 500));
      const { error: updErr } = await supa.from('profiles').update(updates).eq('id', data.user.id);
      if (updErr) throw updErr;

      await reloadTable('profiles');
      render();
      toast('تم إنشاء المستخدم ✓');
    }, { width: '600px' });

    // Toggle client field based on role
    setTimeout(() => {
      const roleSel = document.getElementById('nu-role');
      const clientWrap = document.getElementById('nu-client-wrap');
      const update = () => clientWrap.style.display = roleSel.value === 'client' ? 'block' : 'none';
      roleSel.addEventListener('change', update);
      update();
    }, 50);
    return;
  }

  // Edit existing user — show permission editor
  editUser(existing.id);
}

function editUser(userId) {
  const u = appData.profiles.find(x => x.id === userId);
  if (!u) return;
  const isMe = u.id === profile.id;

  const permsHtml = PERM_GROUPS.map(g => `
    <div class="mb-3">
      <div class="font-semibold text-sm text-slate-700 mb-2">${g.label}</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        ${g.perms.map(p => `
          <label class="perm-toggle">
            <input type="checkbox" data-perm="${p}" ${u[p] ? 'checked' : ''}>
            <span>${PERM_LABELS[p] || p}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `).join('');

  const body = `
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label>الاسم</label><input type="text" id="eu-name" value="${escapeHtml(u.full_name)}"></div>
        <div><label>البريد</label><input type="email" value="${escapeHtml(u.email || '')}" disabled style="background:#f1f5f9;"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label>الدور (preset)</label>
          <select id="eu-role" onchange="applyRolePreset('${userId}', this.value)" ${isMe ? 'disabled' : ''}>
            ${Object.keys(ROLE_LABELS).map(k => `<option value="${k}" ${k === u.role ? 'selected' : ''}>${ROLE_LABELS[k]}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>اربط بعميل (Client Portal)</label>
          <select id="eu-client" ${isMe ? 'disabled' : ''}>
            <option value="">— لا (مستخدم داخلي) —</option>
            ${appData.clients.map(h => `<option value="${h.id}" ${h.id === u.linked_client_id ? 'selected' : ''}>${escapeHtml(h.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="flex items-center gap-4 text-sm py-2 border-y border-slate-200">
        <label class="flex items-center gap-2 m-0"><input type="checkbox" id="eu-active" ${u.active !== false ? 'checked' : ''} ${isMe ? 'disabled' : ''}> نشط</label>
        ${profile.is_admin && !isMe ? `<label class="flex items-center gap-2 m-0"><input type="checkbox" id="eu-admin" ${u.is_admin ? 'checked' : ''}> 👑 مالك (Admin — كل الصلاحيات)</label>` : ''}
        ${u.is_admin ? '<span class="badge badge-purple">👑 مالك</span>' : ''}
      </div>
      <div>
        <h4 class="font-bold text-slate-800 mt-2 mb-3">🔐 الصلاحيات التفصيلية</h4>
        <div id="eu-perms">${permsHtml}</div>
      </div>
      ${profile.is_admin && !isMe ? `
        <div class="pt-3 border-t border-slate-200">
          <button onclick="deleteUser('${userId}')" class="btn btn-danger btn-sm">🗑️ حذف هذا المستخدم</button>
        </div>
      ` : ''}
    </div>`;
  openModal(`تعديل: ${u.full_name}`, body, async () => {
    const updates = {
      full_name: document.getElementById('eu-name').value.trim(),
    };
    if (!isMe) {
      updates.role = document.getElementById('eu-role').value;
      updates.linked_client_id = document.getElementById('eu-client').value || null;
      updates.active = document.getElementById('eu-active').checked;
      if (profile.is_admin) {
        const adminCheck = document.getElementById('eu-admin');
        if (adminCheck) updates.is_admin = adminCheck.checked;
      }
      // Collect granular permissions
      document.querySelectorAll('#eu-perms input[data-perm]').forEach(cb => {
        updates[cb.dataset.perm] = cb.checked;
      });
    }
    const { error } = await supa.from('profiles').update(updates).eq('id', userId);
    if (error) throw error;
    await reloadTable('profiles');
    if (userId === profile.id) await loadProfile();
    render();
    toast('تم التحديث ✓');
  }, { width: '850px' });
}

function applyRolePreset(userId, role) {
  const preset = ROLE_PRESETS[role] || {};
  document.querySelectorAll('#eu-perms input[data-perm]').forEach(cb => {
    cb.checked = !!preset[cb.dataset.perm];
  });
}

function deleteUser(userId) {
  confirmAction('حذف المستخدم نهائياً؟ (الـ auth user يبقى موجود في Supabase Auth — لازم تحذفه يدوياً من هناك)', async () => {
    const { error } = await supa.from('profiles').delete().eq('id', userId);
    if (error) throw error;
    await reloadTable('profiles');
    render();
    closeModal();
    toast('تم حذف الـ profile ✓ — احذف auth user من Supabase Dashboard', 'warn');
  });
}

function buildPublicUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/branding/${path}`;
}

async function uploadLoginBg(event) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading(true);
  try {
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    const path = `login-bg-${Date.now()}.${ext}`;
    console.log('[upload] uploading to:', path);
    const { error: upErr } = await supa.storage.from('branding').upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) { console.error('[upload] storage error:', upErr); throw upErr; }
    const publicUrl = buildPublicUrl(path);
    console.log('[upload] public URL:', publicUrl);
    const { error } = await supa.from('app_settings').update({ login_bg_url: publicUrl }).eq('id', 1);
    if (error) { console.error('[upload] db error:', error); throw error; }
    appData.settings.login_bg_url = publicUrl;
    render();
    toast('تم رفع الصورة ✓');
  } catch (e) { toast('خطأ: ' + (e.message || JSON.stringify(e)), 'error'); }
  finally { showLoading(false); event.target.value = ''; }
}

async function uploadLetterhead(event, kind) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading(true);
  try {
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    const path = `letterhead-${kind}-${Date.now()}.${ext}`;
    const { error: upErr } = await supa.storage.from('branding').upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) throw upErr;
    const publicUrl = buildPublicUrl(path);
    const field = kind === 'header' ? 'letterhead_header_url' : 'letterhead_footer_url';
    const { error } = await supa.from('app_settings').update({ [field]: publicUrl }).eq('id', 1);
    if (error) throw error;
    appData.settings[field] = publicUrl;
    render();
    toast('تم رفع الصورة ✓');
  } catch (e) { toast('خطأ: ' + (e.message || JSON.stringify(e)), 'error'); }
  finally { showLoading(false); event.target.value = ''; }
}

async function clearLetterhead(kind) {
  const field = kind === 'header' ? 'letterhead_header_url' : 'letterhead_footer_url';
  const { error } = await supa.from('app_settings').update({ [field]: null }).eq('id', 1);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  appData.settings[field] = null;
  render();
  toast('تم الحذف ✓');
}

async function exportBackup() {
  showLoading(true);
  try {
    const data = {
      version: 'v4-supabase',
      exported_at: new Date().toISOString(),
      clients: appData.clients, services: appData.services, prices: appData.prices,
      cases: appData.cases, payments: appData.payments, expenses: appData.expenses,
      profiles: appData.profiles.map(p => { const { id, ...rest } = p; return { ...rest, _legacy_id: id }; }),
      settings: appData.settings,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `radiology-backup-${todayISO()}.json`; a.click();
    URL.revokeObjectURL(url);
    toast('تم التصدير ✓');
  } catch (e) { toast('خطأ: ' + e.message, 'error'); }
  finally { showLoading(false); }
}
