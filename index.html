};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

//==============================================================
// STORAGE
//==============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { Object.assign(state, JSON.parse(raw)); }
    else { seedDefaults(); }
  } catch (e) { console.error(e); seedDefaults(); }
}

function saveData() {
  try {
    const toSave = { ...state };
    delete toSave.currentTab;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    flashSaved();
  } catch (e) { toast('خطأ في الحفظ: ' + e.message, 'error'); }
}

function flashSaved() {
  const ind = document.getElementById('save-indicator');
  const txt = document.getElementById('save-text');
  if (!ind) return;
  ind.style.color = '#16a34a';
  txt.textContent = 'محفوظ ✓';
  setTimeout(() => { ind.style.color = '#9ca3af'; }, 1500);
}

function seedDefaults() {
  state.services = DEFAULT_SERVICES.map(s => ({
    id: uid(), code: s.code, name: s.name, nameEn: s.nameEn, category: s.category,
    template: JSON.parse(JSON.stringify(DEFAULT_TEMPLATES[s.code] || { title: s.nameEn || s.name, sections: [], conclusion: '' })),
  }));
  state.hospitals = DEFAULT_HOSPITALS.map(h => ({
    id: uid(), code: h.code, name: h.name, type: h.type,
    phone: '', contactPerson: '', notes: '', openingBalance: 0, active: true,
  }));
  syncPricesMatrix();
  saveData();
}

function syncPricesMatrix() {
  const existing = new Set(state.prices.map(p => p.hospitalId + '|' + p.serviceId));
  state.hospitals.forEach(h => {
    state.services.forEach(s => {
      const key = h.id + '|' + s.id;
      if (!existing.has(key)) {
        state.prices.push({
          id: uid(), hospitalId: h.id, serviceId: s.id,
          priceEgyptian: 0, priceForeign: 0, priceResident: 0,
        });
      }
    });
  });
  const hIds = new Set(state.hospitals.map(h => h.id));
  const sIds = new Set(state.services.map(s => s.id));
  state.prices = state.prices.filter(p => hIds.has(p.hospitalId) && sIds.has(p.serviceId));
}

function fmt(n) { return (Number(n) || 0).toLocaleString('ar-EG', { maximumFractionDigits: 2 }) + ' ج.م'; }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('ar-EG', { year: 'numeric', month: '2-digit', day: '2-digit' }); }
function fmtDateEn(d) { if (!d) return ''; const dt = new Date(d); return String(dt.getDate()).padStart(2,'0')+'.'+String(dt.getMonth()+1).padStart(2,'0')+'.'+dt.getFullYear(); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function findHospital(id) { return state.hospitals.find(h => h.id === id); }
function findService(id) { return state.services.find(s => s.id === id); }
function findPrice(hospitalId, serviceId) { return state.prices.find(p => p.hospitalId === hospitalId && p.serviceId === serviceId); }
function hospitalTypeLabel(code) { const t = HOSPITAL_TYPES.find(x => x.code === code); return t ? t.labelAr : '—'; }
function patientTypeLabel(code) { const t = PATIENT_TYPES.find(x => x.code === code); return t ? t.labelAr : '—'; }
function caseAmount(c) { return Number(c.price) || 0; }

function hospitalDue(hospitalId, dateFrom = null, dateTo = null, includeOpening = true) {
  const h = findHospital(hospitalId);
  const opening = includeOpening ? (Number(h?.openingBalance) || 0) : 0;
  let cases = state.cases.filter(c => c.hospitalId === hospitalId && !c.cashDirect);
  let payments = state.payments.filter(p => p.hospitalId === hospitalId);
  if (dateFrom) { cases = cases.filter(c => (c.date||'') >= dateFrom); payments = payments.filter(p => (p.date||'') >= dateFrom); }
  if (dateTo)   { cases = cases.filter(c => (c.date||'') <= dateTo);   payments = payments.filter(p => (p.date||'') <= dateTo); }
  const earned = cases.reduce((s, c) => s + caseAmount(c), 0);
  const paid   = payments.reduce((s, p) => s + (Number(p.amount) || 0), 0);
  return { opening, earned, paid, due: opening + earned - paid, cases, payments };
}

function hospitalCashDirect(hospitalId, dateFrom = null, dateTo = null) {
  let cases = state.cases.filter(c => c.hospitalId === hospitalId && c.cashDirect);
  if (dateFrom) cases = cases.filter(c => (c.date||'') >= dateFrom);
  if (dateTo)   cases = cases.filter(c => (c.date||'') <= dateTo);
  const amount = cases.reduce((s, c) => s + caseAmount(c), 0);
  return { cases, amount };
}

function toast(msg, type = 'success') {
  const cont = document.getElementById('toast-container');
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600', warn: 'bg-yellow-600' };
  const el = document.createElement('div');
  el.className = `toast-box ${colors[type]} text-white px-4 py-2 rounded shadow-lg text-sm`;
  el.textContent = msg;
  cont.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function openModal(title, contentHtml, onSave, opts = {}) {
  const cont = document.getElementById('modal-container');
  cont.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width:${opts.width || '700px'}">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-bold">${escapeHtml(title)}</h3>
          <button onclick="closeModal()" class="text-gray-500 hover:text-gray-800 text-2xl leading-none">&times;</button>
        </div>
        <div id="modal-body">${contentHtml}</div>
        ${onSave ? `<div class="flex gap-2 justify-end mt-6">
          <button onclick="closeModal()" class="btn btn-secondary">إلغاء</button>
          <button id="modal-save-btn" class="btn ${opts.saveClass || 'btn-primary'}">${escapeHtml(opts.saveLabel || 'حفظ')}</button>
        </div>` : `<div class="flex justify-end mt-6"><button onclick="closeModal()" class="btn btn-secondary">إغلاق</button></div>`}
      </div>
    </div>`;
  if (onSave) {
    document.getElementById('modal-save-btn').onclick = () => { const ok = onSave(); if (ok !== false) closeModal(); };
  }
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
function confirmAction(msg, cb) {
  openModal('تأكيد', `<p class="text-gray-700">${escapeHtml(msg)}</p>`, () => { cb(); return true; }, { saveLabel: 'تأكيد', saveClass: 'btn-danger' });
}

function updatePriceFromForm() {
  const hId = document.getElementById('nc-hospital').value;
  const sId = document.getElementById('nc-service').value;
  const type = document.getElementById('nc-type').value;
  if (!hId || !sId) return;
  const price = findPrice(hId, sId);
  if (!price) return;
  const pt = PATIENT_TYPES.find(t => t.code === type);
  const field = pt ? pt.priceField : 'priceEgyptian';
  document.getElementById('nc-price').value = price[field] || 0;
}

function saveNewCase(e) {
  e.preventDefault();
  const cashDirect = document.getElementById('nc-cash').checked;
  const c = {
    id: uid(),
    date: document.getElementById('nc-date').value,
    hospitalId: document.getElementById('nc-hospital').value,
    serviceId: document.getElementById('nc-service').value,
    patientName: document.getElementById('nc-patient').value.trim(),
    dateOfBirth: document.getElementById('nc-dob').value,
    nationality: document.getElementById('nc-nationality').value.trim(),
    patientType: document.getElementById('nc-type').value,
    price: Number(document.getElementById('nc-price').value) || 0,
    cashDirect,
    notes: document.getElementById('nc-notes').value.trim(),
    report: null,
    createdAt: new Date().toISOString(),
  };
  state.cases.push(c);
  saveData();
  toast('تم حفظ الحالة ✓');
  switchTab('cases');
}

  if (casesFilter.to)       filtered = filtered.filter(c => (c.date || '') <= casesFilter.to);

  if (casesFilter.cashOnly === 'hosp')  filtered = filtered.filter(c => !c.cashDirect);

            ${PATIENT_TYPES.map(t => `<option value="${t.code}" ${t.code === c.patientType ? 'selected' : ''}>${t.labelAr}</option>`).join('')}

      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label>الجهة</label>
          <select id="ec-hospital">${state.hospitals.map(h => `<option value="${h.id}" ${h.id === c.hospitalId ? 'selected' : ''}>${escapeHtml(h.name)}</option>`).join('')}</select>
        </div>
        <div><label>الخدمة</label>
          <select id="ec-service">${state.services.map(s => `<option value="${s.id}" ${s.id === c.serviceId ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}</select>
        </div>
      </div>
      <div><label>السعر (ج.م)</label><input type="number" step="0.01" id="ec-price" value="${c.price || 0}"></div>
      <div class="bg-green-50 border border-green-200 rounded p-3">
        <label class="flex items-start gap-2 cursor-pointer">

    c.date = document.getElementById('ec-date').value;
    c.dateOfBirth = document.getElementById('ec-dob').value;

    c.nationality = document.getElementById('ec-nat').value.trim();
    c.patientType = document.getElementById('ec-type').value;
    c.hospitalId = document.getElementById('ec-hospital').value;
    c.serviceId = document.getElementById('ec-service').value;
    c.price = Number(document.getElementById('ec-price').value) || 0;
    c.cashDirect = document.getElementById('ec-cash').checked;

}

function deleteCase(id) {
  confirmAction('حذف هذه الحالة؟', () => { state.cases = state.cases.filter(c => c.id !== id); saveData(); render(); toast('تم الحذف ✓'); });
}

function openReportChooser(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const currentService = findService(c.serviceId);
  const hasExistingReport = !!c.report;

  const otherServicesOptions = state.services
    .filter(s => s.id !== currentService?.id)
    .map(s => `<option value="${s.id}">${escapeHtml(s.name)}${s.nameEn ? ' — ' + escapeHtml(s.nameEn) : ''}</option>`)
    .join('');

  const body = `
    <div class="space-y-3">
      <div class="bg-blue-50 p-3 rounded text-sm mb-3">
        <strong>المريض:</strong> ${escapeHtml(c.patientName)} | <strong>الخدمة المسجّلة:</strong> ${escapeHtml(currentService?.name || '?')}
      </div>

      ${hasExistingReport ? `
        <button onclick="writeReport('${caseId}', 'existing')" class="chooser-card existing">
          <div class="font-semibold text-green-800">✏️ متابعة تعديل التقرير الحالي</div>
          <div class="text-xs text-gray-600 mt-1">التقرير مكتوب بالفعل — افتحه للتعديل أو الطباعة</div>
        </button>
      ` : ''}

      <button onclick="writeReport('${caseId}', 'service:${currentService?.id}')" class="chooser-card">
        <div class="font-semibold">📋 استخدام قالب الخدمة: ${escapeHtml(currentService?.name || '')}</div>
        <div class="text-xs text-gray-600 mt-1">القالب الافتراضي المرتبط بنوع الخدمة المسجّلة</div>
      </button>

      <div class="border-2 border-gray-200 rounded-lg p-3">
        <div class="font-semibold mb-2 text-sm">📑 استخدام قالب خدمة أخرى:</div>
        <select id="chooser-other-service" class="mb-2">
          <option value="">-- اختر خدمة --</option>
          ${otherServicesOptions}
        </select>
        <button onclick="useOtherTemplate('${caseId}')" class="btn btn-primary w-full">افتح القالب المختار</button>
      </div>

      <button onclick="writeReport('${caseId}', 'blank')" class="chooser-card" style="border-color:#eab308; background:#fefce8">
        <div class="font-semibold" style="color:#854d0e">📝 قالب حر (فارغ)</div>
        <div class="text-xs text-gray-600 mt-1">ابدأ من الصفر بدون أي قالب مسبق — اكتب كل الأقسام بنفسك</div>
      </button>
    </div>`;

  openModal('📄 اختر نمط التقرير', body, null, { width: '600px' });
}

function useOtherTemplate(caseId) {
  const sel = document.getElementById('chooser-other-service');
  if (!sel || !sel.value) { toast('اختر خدمة الأول', 'warn'); return; }
  writeReport(caseId, 'service:' + sel.value);
}

function writeReport(caseId, source) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const h = findHospital(c.hospitalId);

  let report;
  if (source === 'existing' && c.report) {
    report = JSON.parse(JSON.stringify(c.report));
  } else if (source === 'blank') {
    report = { title: '', sections: [{ heading: '', content: '' }], conclusion: '' };
  } else if (source && source.startsWith('service:')) {
    const sid = source.slice('service:'.length);
    const s = findService(sid);
    if (s && s.template) {
      report = JSON.parse(JSON.stringify(s.template));
    } else {
      report = { title: '', sections: [], conclusion: '' };
    }
  } else {
    report = { title: '', sections: [], conclusion: '' };
  }

  const sectionsHtml = (report.sections || []).map((sec, i) => `
    <div class="mb-3" data-idx="${i}">
      <input type="text" class="sec-heading-edit" data-field="heading" value="${escapeHtml(sec.heading)}">
      <textarea class="sec-content-edit" data-field="content" rows="5">${escapeHtml(sec.content)}</textarea>
    </div>`).join('');

  const body = `
    <div class="space-y-3">
      <div class="bg-blue-50 p-3 rounded text-sm">
        <strong>المريض:</strong> ${escapeHtml(c.patientName)} | <strong>الجهة:</strong> ${escapeHtml(h?.name || '?')}
      </div>
      <div class="report-edit">
        <div class="mb-3"><label>عنوان التقرير (في وسط الصفحة)</label><input type="text" id="rpt-title" value="${escapeHtml(report.title || '')}" style="direction:ltr; text-align:left; font-weight:bold; font-size:15px"></div>
        <div id="rpt-sections">${sectionsHtml}</div>
        <button type="button" onclick="addReportSection()" class="btn btn-secondary mb-3">➕ إضافة قسم</button>
        <div><label>CONCLUSION (الخلاصة)</label><textarea id="rpt-conclusion" rows="4" style="direction:ltr; text-align:left; font-family:'Times New Roman',serif">${escapeHtml(report.conclusion || '')}</textarea></div>
      </div>
      <div class="flex gap-2 justify-between pt-3 border-t">
        <div class="text-xs text-gray-500 self-center">اسم المريض وتاريخ الميلاد وتاريخ الفحص بيظهروا أسفل التقرير تلقائياً</div>
        <button type="button" onclick="printReport('${caseId}', true)" class="btn btn-primary">🖨️ حفظ وطباعة / PDF</button>
      </div>
    </div>`;

  openModal('✍️ كتابة تقرير', body, () => {
    const saved = collectReportFromDom();
    c.report = saved; saveData(); render(); toast('تم حفظ التقرير ✓');
  }, { saveLabel: '💾 حفظ فقط', width: '850px' });
}

function collectReportFromDom() {
  const title = document.getElementById('rpt-title').value;
  const conclusion = document.getElementById('rpt-conclusion').value;
  const sections = [];
  document.querySelectorAll('#rpt-sections > [data-idx]').forEach(div => {
    const heading = div.querySelector('[data-field="heading"]')?.value || '';
    const content = div.querySelector('[data-field="content"]')?.value || '';
    if (heading || content) sections.push({ heading, content });
  });
  return { title, sections, conclusion };
}

function addReportSection() {
  const container = document.getElementById('rpt-sections');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'mb-3';
  div.setAttribute('data-idx', idx);
  div.innerHTML = `
    <div class="flex gap-2 items-start">
      <div class="flex-1">
        <input type="text" class="sec-heading-edit" data-field="heading" placeholder="عنوان القسم">
        <textarea class="sec-content-edit" data-field="content" rows="4" placeholder="المحتوى"></textarea>
      </div>
      <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 hover:underline text-sm">حذف</button>
    </div>`;
  container.appendChild(div);
}

function printReport(caseId, saveFirst = false) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  if (saveFirst) { c.report = collectReportFromDom(); saveData(); }
  const report = c.report || {};

    <h3 class="sec-heading">${escapeHtml(sec.heading || '')}</h3>
    <div class="sec-content">${escapeHtml(sec.content || '')}</div>`).join('');

  const safePatient = (c.patientName || 'Report').replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_').slice(0, 50);
  const filename = `${safePatient}_${c.date || todayISO()}.pdf`;

  const w = window.open('', '_blank', 'width=900,height=1100');
  w.document.write(`
<!DOCTYPE html><html lang="en" dir="ltr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  .btn-print { background: #2563eb; }
  .btn-pdf { background: #16a34a; }

  .action-bar button:hover { opacity: 0.9; }
  #report-container { margin-top: 70px; }
  #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }

</style></head><body>

<div class="action-bar no-print">
  <button class="btn-print" onclick="doPrint()">🖨️ طباعة</button>
  <button class="btn-pdf" onclick="doDownloadPdf()">📥 تحميل PDF</button>
  <button class="btn-share" onclick="doShare()">📤 مشاركة</button>
  <button class="btn-close" onclick="window.close()">✕ إغلاق</button>
</div>

    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },

  };

function renderPayments() {
  const sorted = [...state.payments].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const total = sorted.reduce((s, p) => s + (Number(p.amount) || 0), 0);
  return `
    <div class="space-y-4">
      <div class="card">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-lg font-bold">💰 المقبوضات من المستشفيات (${sorted.length})</h2>
          <button onclick="addPayment()" class="btn btn-success">➕ إضافة مقبوض</button>
        </div>
        <p class="text-xs text-gray-500 mb-2">الفلوس اللي بتستلمها من المستشفى. الكاش المباشر بيتحفظ من الحالة نفسها — مش هنا.</p>
        <div class="text-sm text-gray-700">الإجمالي: <strong>${fmt(total)}</strong></div>
      </div>
      <div class="card overflow-x-auto">
        ${sorted.length === 0 ? `<p class="text-gray-500 text-center py-6">لا توجد مقبوضات بعد.</p>` :
        `<table class="mobile-stack">
          <thead><tr><th>التاريخ</th><th>الجهة</th><th>المبلغ</th><th>الطريقة</th><th>ملاحظات</th><th></th></tr></thead>
          <tbody>${sorted.map(p => `
            <tr>
              <td>${fmtDate(p.date)}</td>
              <td>${escapeHtml(findHospital(p.hospitalId)?.name || '?')}</td>
              <td class="font-bold text-green-700">${fmt(p.amount)}</td>
              <td>${escapeHtml(p.method || '')}</td>
              <td>${escapeHtml(p.notes || '')}</td>
              <td>
                <button onclick="editPayment('${p.id}')" class="text-blue-600 hover:underline text-sm">تعديل</button>
                <button onclick="deletePayment('${p.id}')" class="text-red-600 hover:underline text-sm mr-2">حذف</button>
              </td>
            </tr>`).join('')}</tbody>
        </table>`}
      </div>
    </div>`;
}

function addPayment(existing = null) {
  if (state.hospitals.length === 0) { toast('أضف جهة الأول', 'warn'); return; }
  const p = existing || { date: todayISO(), hospitalId: '', amount: 0, method: 'كاش', notes: '' };
  const body = `
    <div class="space-y-3">
      <div><label>التاريخ</label><input type="date" id="pm-date" value="${p.date || todayISO()}"></div>
      <div><label>الجهة</label><select id="pm-hospital"><option value="">-- اختر --</option>${state.hospitals.map(h => `<option value="${h.id}" ${h.id === p.hospitalId ? 'selected' : ''}>${escapeHtml(h.name)}</option>`).join('')}</select></div>
      <div><label>المبلغ (ج.م)</label><input type="number" step="0.01" min="0" id="pm-amount" value="${p.amount || ''}"></div>
      <div><label>طريقة الدفع</label><select id="pm-method">${PAYMENT_METHODS.map(m => `<option ${p.method === m ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
      <div><label>ملاحظات</label><textarea id="pm-notes" rows="2">${escapeHtml(p.notes || '')}</textarea></div>
    </div>`;
  openModal(existing ? 'تعديل مقبوض' : 'إضافة مقبوض', body, () => {
    const data = { id: existing ? existing.id : uid(), date: document.getElementById('pm-date').value, hospitalId: document.getElementById('pm-hospital').value, amount: Number(document.getElementById('pm-amount').value) || 0, method: document.getElementById('pm-method').value, notes: document.getElementById('pm-notes').value.trim() };
    if (!data.hospitalId) { toast('اختر جهة', 'error'); return false; }
    if (data.amount <= 0) { toast('المبلغ يجب أن يكون أكبر من صفر', 'error'); return false; }
    if (existing) Object.assign(existing, data); else state.payments.push(data);
    saveData(); render(); toast(existing ? 'تم التحديث ✓' : 'تم الحفظ ✓');
  });
}
function editPayment(id) { const p = state.payments.find(x => x.id === id); if (p) addPayment(p); }
function deletePayment(id) { confirmAction('حذف هذا المقبوض؟', () => { state.payments = state.payments.filter(p => p.id !== id); saveData(); render(); toast('تم الحذف ✓'); }); }

}

function addExpense(existing = null) {

      <div><label>المبلغ (ج.م)</label><input type="number" step="0.01" min="0" id="ex-amount" value="${e.amount || ''}"></div>
    </div>`;

}
function editExpense(id) { const e = state.expenses.find(x => x.id === id); if (e) addExpense(e); }
function deleteExpense(id) { confirmAction('حذف هذا المصروف؟', () => { state.expenses = state.expenses.filter(e => e.id !== id); saveData(); render(); toast('تم الحذف ✓'); }); }

function renderStatement() {

function generateStatement() {
  const hospitalId = document.getElementById('stmt-hospital').value;
  const from = document.getElementById('stmt-from').value;
  const to = document.getElementById('stmt-to').value;
  const out = document.getElementById('stmt-output');
  if (!hospitalId) { out.innerHTML = ''; return; }

  const h = findHospital(hospitalId);
  const { opening, earned, paid, due, cases, payments } = hospitalDue(hospitalId, from || null, to || null, !(from || to));
  const cashInfo = hospitalCashDirect(hospitalId, from || null, to || null);
  cases.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  payments.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  cashInfo.cases.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  out.innerHTML = `
    <div class="card space-y-4">
      <div class="text-center border-b pb-3">
        <h1 class="text-2xl font-bold">${escapeHtml(state.settings.clinicName || 'عيادة طبيب الأشعة')}</h1>
        ${state.settings.doctorName ? `<p class="text-sm text-gray-600">د. ${escapeHtml(state.settings.doctorName)}</p>` : ''}
        ${state.settings.phone ? `<p class="text-sm text-gray-600">📞 ${escapeHtml(state.settings.phone)}</p>` : ''}
        <h2 class="text-xl font-bold mt-3">كشف حساب — ${escapeHtml(h.name)} <span class="text-sm text-gray-500">(${hospitalTypeLabel(h.type)})</span></h2>
        <p class="text-sm text-gray-600">${from ? `من ${fmtDate(from)}` : 'من البداية'} ${to ? `إلى ${fmtDate(to)}` : 'حتى ' + fmtDate(todayISO())}</p>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
        <div class="p-3 bg-gray-50 rounded"><div class="text-xs text-gray-600">رصيد أول مدة</div><div class="text-lg font-bold">${fmt(opening)}</div></div>
        <div class="p-3 bg-blue-50 rounded"><div class="text-xs text-gray-600">مكتسب (حساب المستشفى)</div><div class="text-lg font-bold">${fmt(earned)}</div></div>
        <div class="p-3 bg-green-50 rounded"><div class="text-xs text-gray-600">محصَّل</div><div class="text-lg font-bold text-green-700">${fmt(paid)}</div></div>
        <div class="p-3 ${due > 0 ? 'bg-red-50' : 'bg-green-50'} rounded"><div class="text-xs text-gray-600">المتبقي</div><div class="text-lg font-bold ${due > 0 ? 'text-red-700' : 'text-green-700'}">${fmt(due)}</div></div>
      </div>

      ${cashInfo.amount > 0 ? `
        <div class="p-3 bg-green-50 rounded border border-green-200 text-center">
          <div class="text-xs text-gray-700">💵 دخل كاش مباشر (مش من حساب المستشفى)</div>
          <div class="text-lg font-bold text-green-700">${fmt(cashInfo.amount)}</div>
          <div class="text-xs text-gray-500 mt-1">${cashInfo.cases.length} حالة — مستلم مباشرة</div>
        </div>
      ` : ''}

      <div>
        <h3 class="font-bold mb-2">الحالات على حساب المستشفى (${cases.length})</h3>
        ${cases.length === 0 ? '<p class="text-gray-500 text-sm">لا توجد حالات في الفترة</p>' :
        `<table class="text-sm"><thead><tr><th>التاريخ</th><th>المريض</th><th>الجنسية</th><th>النوع</th><th>الخدمة</th><th>السعر</th></tr></thead><tbody>
          ${cases.map(c => `<tr><td>${fmtDate(c.date)}</td><td>${escapeHtml(c.patientName || '')}</td><td class="text-xs">${escapeHtml(c.nationality || '—')}</td><td>${patientTypeLabel(c.patientType)}</td><td>${escapeHtml(findService(c.serviceId)?.name || '?')}</td><td class="font-bold">${fmt(caseAmount(c))}</td></tr>`).join('')}
          <tr class="font-bold bg-gray-50"><td colspan="5" class="text-left">إجمالي</td><td>${fmt(earned)}</td></tr>
        </tbody></table>`}
      </div>

      ${cashInfo.cases.length > 0 ? `
        <div>
          <h3 class="font-bold mb-2">💵 حالات الكاش المباشر (${cashInfo.cases.length}) — للاطلاع فقط</h3>
          <table class="text-sm"><thead><tr><th>التاريخ</th><th>المريض</th><th>الخدمة</th><th>السعر</th></tr></thead><tbody>
            ${cashInfo.cases.map(c => `<tr><td>${fmtDate(c.date)}</td><td>${escapeHtml(c.patientName || '')}</td><td>${escapeHtml(findService(c.serviceId)?.name || '?')}</td><td class="font-bold">${fmt(caseAmount(c))}</td></tr>`).join('')}
            <tr class="font-bold bg-gray-50"><td colspan="3" class="text-left">إجمالي</td><td>${fmt(cashInfo.amount)}</td></tr>
          </tbody></table>
        </div>
      ` : ''}

      <div>
        <h3 class="font-bold mb-2">المقبوضات (${payments.length})</h3>
        ${payments.length === 0 ? '<p class="text-gray-500 text-sm">لا توجد مقبوضات في الفترة</p>' :
        `<table class="text-sm"><thead><tr><th>التاريخ</th><th>المبلغ</th><th>الطريقة</th><th>ملاحظات</th></tr></thead><tbody>
          ${payments.map(p => `<tr><td>${fmtDate(p.date)}</td><td class="font-bold text-green-700">${fmt(p.amount)}</td><td>${escapeHtml(p.method || '')}</td><td>${escapeHtml(p.notes || '')}</td></tr>`).join('')}
          <tr class="font-bold bg-gray-50"><td class="text-left">إجمالي</td><td colspan="3">${fmt(paid)}</td></tr>
        </tbody></table>`}
      </div>
    </div>`;
}

      <div class="flex justify-between items-center mb-2">
        <input type="text" class="sec-heading-edit" data-field="heading" value="${escapeHtml(sec.heading)}" style="flex:1">
        <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 text-sm mr-2">حذف</button>
      </div>
      <textarea class="sec-content-edit" data-field="content" rows="5">${escapeHtml(sec.content)}</textarea>
    </div>`).join('');

  const body = `
    <div class="report-edit space-y-3">
      <div><label>عنوان التقرير</label><input type="text" id="tpl-title" value="${escapeHtml(t.title || '')}" style="direction:ltr; text-align:left; font-weight:bold"></div>
      <div>
        <label>الأقسام</label>
        <div id="tpl-sections">${sectionsHtml}</div>
        <button type="button" onclick="addTplSection()" class="btn btn-secondary mt-2">➕ إضافة قسم</button>
      </div>
      <div><label>CONCLUSION</label><textarea id="tpl-conclusion" rows="4" style="direction:ltr; text-align:left; font-family:'Times New Roman',serif">${escapeHtml(t.conclusion || '')}</textarea></div>
    </div>`;
  openModal(`تعديل قالب: ${s.name}`, body, () => {
    const sections = [];
    document.querySelectorAll('#tpl-sections > [data-idx]').forEach(div => {
      const heading = div.querySelector('[data-field="heading"]')?.value || '';
      const content = div.querySelector('[data-field="content"]')?.value || '';
      if (heading || content) sections.push({ heading, content });
    });
    s.template = { title: document.getElementById('tpl-title').value, sections, conclusion: document.getElementById('tpl-conclusion').value };
    saveData(); render(); toast('تم حفظ القالب ✓');
  }, { width: '850px' });
}

function addTplSection() {
  const container = document.getElementById('tpl-sections');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'mb-3 p-3 border rounded';
  div.setAttribute('data-idx', idx);
  div.innerHTML = `
    <div class="flex justify-between items-center mb-2">
      <input type="text" class="sec-heading-edit" data-field="heading" placeholder="عنوان القسم" style="flex:1">
      <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 text-sm mr-2">حذف</button>
    </div>
    <textarea class="sec-content-edit" data-field="content" rows="5" placeholder="المحتوى"></textarea>`;
  container.appendChild(div);
}

function resetTemplateToDefault(serviceId) {
  const s = findService(serviceId);
  if (!s) return;
  const def = DEFAULT_TEMPLATES[s.code];
  if (!def) { toast('لا يوجد قالب افتراضي', 'warn'); return; }
  confirmAction('إرجاع القالب للحالة الافتراضية؟', () => { s.template = JSON.parse(JSON.stringify(def)); saveData(); render(); toast('تم الإرجاع ✓'); });
}

function renderProfileSettings() {
  return `
    <div class="card max-w-lg">
      <h3 class="font-bold mb-3">👤 بياناتي</h3>
      <div class="space-y-3">
        <div><label>اسم الدكتور</label><input type="text" id="pr-doctor" value="${escapeHtml(state.settings.doctorName || '')}"></div>
        <div><label>اسم العيادة / المركز</label><input type="text" id="pr-clinic" value="${escapeHtml(state.settings.clinicName || '')}"></div>
        <div><label>العنوان</label><input type="text" id="pr-address" value="${escapeHtml(state.settings.address || '')}"></div>
        <div><label>هاتف التواصل</label><input type="text" id="pr-phone" value="${escapeHtml(state.settings.phone || '')}"></div>
        <button onclick="saveProfile()" class="btn btn-primary">💾 حفظ</button>
      </div>
    </div>`;
}

function saveProfile() {
  state.settings.doctorName = document.getElementById('pr-doctor').value.trim();
  state.settings.clinicName = document.getElementById('pr-clinic').value.trim();
  state.settings.address = document.getElementById('pr-address').value.trim();
  state.settings.phone = document.getElementById('pr-phone').value.trim();
  saveData(); toast('تم الحفظ ✓');
}

function renderBackupSettings() {
  const stats = { hospitals: state.hospitals.length, services: state.services.length, cases: state.cases.length, payments: state.payments.length, expenses: state.expenses.length };
  return `
    <div class="space-y-4">
      <div class="card">
        <h3 class="font-bold mb-3">📊 الإحصائيات</h3>
        <ul class="text-sm space-y-1">
          <li>جهات: <strong>${stats.hospitals}</strong></li>
          <li>خدمات: <strong>${stats.services}</strong></li>
          <li>حالات: <strong>${stats.cases}</strong></li>
          <li>مقبوضات: <strong>${stats.payments}</strong></li>
          <li>مصاريف: <strong>${stats.expenses}</strong></li>
        </ul>
      </div>
      <div class="card bg-yellow-50 border-r-4 border-yellow-500">
        <h3 class="font-bold mb-2">⚠️ نسخة احتياطية بانتظام</h3>
        <p class="text-sm text-gray-700 mb-3">البيانات على هذا الجهاز فقط. صدّر كل أسبوع واحفظ على Google Drive.</p>
        <div class="flex gap-2 flex-wrap">
          <button onclick="exportBackup()" class="btn btn-success">⬇️ تصدير</button>
          <label class="btn btn-primary cursor-pointer">⬆️ استيراد<input type="file" accept=".json" onchange="importBackup(event)" class="hidden"></label>
        </div>
      </div>
      <div class="card bg-red-50 border-r-4 border-red-500">
        <h3 class="font-bold mb-2 text-red-700">🚨 منطقة الخطر</h3>
        <button onclick="wipeAllData()" class="btn btn-danger">🗑️ حذف كل البيانات</button>
      </div>
    </div>`;
}

function exportBackup() {
  const data = { version: 4, exportedAt: new Date().toISOString(), hospitals: state.hospitals, services: state.services, prices: state.prices, cases: state.cases, payments: state.payments, expenses: state.expenses, settings: state.settings };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `radiology-backup-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('تم التصدير ✓');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) throw new Error('ملف غير صالح');
      confirmAction('استبدال كل البيانات الحالية؟', () => {
        state.hospitals = data.hospitals || [];
        state.services = data.services || [];
        state.prices = data.prices || [];
        state.cases = data.cases || [];
        state.payments = data.payments || [];
        state.expenses = data.expenses || [];
        state.settings = data.settings || state.settings;
        syncPricesMatrix();
        saveData(); render(); toast('تم الاستيراد ✓');
      });
    } catch (err) { toast('ملف غير صالح: ' + err.message, 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function wipeAllData() {
  confirmAction('حذف كل البيانات؟', () => {
    confirmAction('تأكيد أخير؟', () => {
      localStorage.removeItem(STORAGE_KEY);
      state = { hospitals: [], services: [], prices: [], cases: [], payments: [], expenses: [], settings: { doctorName: '', clinicName: '', phone: '', address: '' }, currentTab: 'dashboard' };
      seedDefaults(); render(); toast('تمت إعادة التعيين', 'warn');
    });
  });
}

//==============================================================
// INIT
//==============================================================
loadData();
syncPricesMatrix();
initNationalitiesList();
render();
</script>
</body>
</html>
