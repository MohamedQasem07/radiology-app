function openReportChooser(caseId) {
  const c = appData.cases.find(x => x.id === caseId);
  if (!c) return;
  const currentService = findService(c.service_id);
  const hasExisting = !!c.report;

  const otherServicesOptions = appData.services
    .filter(s => s.id !== currentService?.id)
    .map(s => `<option value="${s.id}">${escapeHtml(s.name)}${s.name_en ? ' — ' + escapeHtml(s.name_en) : ''}</option>`)
    .join('');

  const body = `
    <div class="space-y-3">
      <div class="bg-sky-50 p-3 rounded-lg text-sm border border-sky-200">
        <strong>المريض:</strong> ${escapeHtml(c.patient_name)} | <strong>الخدمة:</strong> ${escapeHtml(currentService?.name || '?')}
      </div>
      ${hasExisting ? `
        <button onclick="writeReport('${caseId}', 'existing')" class="chooser-card existing">
          <div class="font-bold text-emerald-800">✏️ متابعة تعديل التقرير الحالي</div>
          <div class="text-xs text-slate-600 mt-1">التقرير مكتوب — افتحه للتعديل أو الطباعة</div>
        </button>
      ` : ''}
      ${currentService?.template?.sections?.length > 0 ? `
        <button onclick="writeReport('${caseId}', 'service:${currentService.id}')" class="chooser-card">
          <div class="font-bold">📋 قالب الخدمة: ${escapeHtml(currentService.name)}</div>
          <div class="text-xs text-slate-600 mt-1">القالب الافتراضي للخدمة</div>
        </button>
      ` : ''}
      <div class="border-2 border-slate-200 rounded-lg p-3 bg-white">
        <div class="font-semibold mb-2 text-sm">📑 قالب خدمة أخرى:</div>
        <select id="chooser-other-service" class="mb-2"><option value="">-- اختر --</option>${otherServicesOptions}</select>
        <button onclick="useOtherTemplate('${caseId}')" class="btn btn-primary w-full" style="width:100%;">افتح القالب</button>
      </div>
      <button onclick="writeReport('${caseId}', 'blank')" class="chooser-card" style="border-color:#fbbf24; background:#fffbeb;">
        <div class="font-bold" style="color:#854d0e;">📝 قالب فارغ</div>
        <div class="text-xs text-slate-600 mt-1">ابدأ من الصفر</div>
      </button>
    </div>`;
  openModal('📄 اختر نمط التقرير', body, null, { width: '600px' });
}

function useOtherTemplate(caseId) {
  const sel = document.getElementById('chooser-other-service');
  if (!sel || !sel.value) { toast('اختر خدمة', 'warn'); return; }
  writeReport(caseId, 'service:' + sel.value);
}

function writeReport(caseId, source) {
  const c = appData.cases.find(x => x.id === caseId);
  if (!c) return;
  const h = findClient(c.client_id);

  let report;
  if (source === 'existing' && c.report) {
    report = JSON.parse(JSON.stringify(c.report));
  } else if (source === 'blank') {
    report = { title: '', sections: [{ heading: '', content: '' }], conclusion: '' };
  } else if (source && source.startsWith('service:')) {
    const sid = source.slice('service:'.length);
    const s = findService(sid);
    report = s?.template ? JSON.parse(JSON.stringify(s.template)) : { title: '', sections: [], conclusion: '' };
  } else {
    report = { title: '', sections: [], conclusion: '' };
  }

  const canEdit = can('perm_write_report') || can('perm_edit_report');
  const readOnly = !canEdit;

  const sectionsHtml = (report.sections || []).map((sec, i) => {
    const ta = `<textarea class="sec-content-edit" data-field="content" rows="5"${readOnly ? ' readonly' : ''}>${escapeHtml(sec.content)}</textarea>`;
    return `
    <div class="mb-3" data-idx="${i}">
      <input type="text" class="sec-heading-edit" data-field="heading" value="${escapeHtml(sec.heading)}"${readOnly ? ' readonly' : ''}>
      ${canEdit ? voiceWrap(ta, 'ar-EG') : ta}
    </div>`;
  }).join('');

  const conclusionTa = `<textarea id="rpt-conclusion" rows="4" style="direction:ltr; text-align:left; font-family:'Times New Roman',serif"${readOnly ? ' readonly' : ''}>${escapeHtml(report.conclusion || '')}</textarea>`;

  // Past reports for the same patient (excluding the current case)
  const pastReports = (appData.cases || []).filter(x =>
    x.id !== c.id &&
    (x.patient_name || '').trim().toLowerCase() === (c.patient_name || '').trim().toLowerCase() &&
    !!x.report
  ).sort((a,b) => (b.case_date || '').localeCompare(a.case_date || ''));

  const body = `
    <div class="space-y-3">
      <div class="bg-sky-50 p-3 rounded-lg text-sm border border-sky-200 flex items-center justify-between gap-2 flex-wrap">
        <div><strong>المريض:</strong> ${escapeHtml(c.patient_name)} | <strong>العميل:</strong> ${escapeHtml(h?.name || '?')}</div>
        ${pastReports.length > 0 ? `<button type="button" onclick="showPastReports('${c.id}')" class="text-sky-700 hover:bg-sky-100 px-2 py-1 rounded text-xs font-semibold whitespace-nowrap">📚 تقارير سابقة (${pastReports.length})</button>` : ''}
      </div>
      ${canEdit ? `<div class="bg-amber-50 border border-amber-200 rounded-lg p-2 text-xs text-amber-800">🎤 اضغط الميكروفون للإملاء الصوتي. اضغط مرة تانية للإيقاف. (يدعم Chrome / Edge / Safari)</div>` : ''}
      <div class="report-edit">
        <div class="mb-3"><label>عنوان التقرير</label><input type="text" id="rpt-title" value="${escapeHtml(report.title || '')}" style="direction:ltr; text-align:left; font-weight:bold; font-size:15px" ${readOnly ? 'readonly' : ''}></div>
        <div id="rpt-sections">${sectionsHtml}</div>
        ${canEdit ? `<button type="button" onclick="addReportSection()" class="btn btn-secondary mb-3">➕ إضافة قسم</button>` : ''}
        <div><label>CONCLUSION</label>${canEdit ? voiceWrap(conclusionTa, 'ar-EG') : conclusionTa}</div>
      </div>
      <div class="flex gap-2 justify-end pt-3 border-t border-slate-200">
        <button type="button" onclick="printReport('${caseId}', ${canEdit})" class="btn btn-primary">🖨️ ${canEdit ? 'حفظ و' : ''}طباعة / PDF</button>
      </div>
    </div>`;

  openModal('✍️ التقرير', body, canEdit ? async () => {
    const saved = collectReportFromDom();
    const { error } = await supa.from('cases').update({ report: saved }).eq('id', c.id);
    if (error) throw error;
    await reloadTable('cases');
    render();
    toast('تم حفظ التقرير ✓');
  } : null, { saveLabel: '💾 حفظ', width: '880px' });
}

function showPastReports(currentCaseId) {
  const c = appData.cases.find(x => x.id === currentCaseId);
  if (!c) return;
  const past = (appData.cases || []).filter(x =>
    x.id !== c.id &&
    (x.patient_name || '').trim().toLowerCase() === (c.patient_name || '').trim().toLowerCase() &&
    !!x.report
  ).sort((a,b) => (b.case_date || '').localeCompare(a.case_date || ''));

  if (past.length === 0) { toast('لا توجد تقارير سابقة', 'info'); return; }

  const body = `
    <div class="space-y-2">
      <p class="text-sm text-slate-600 mb-3">📚 تقارير سابقة لـ <strong>${escapeHtml(c.patient_name)}</strong></p>
      ${past.map(p => {
        const sv = findService(p.service_id);
        const cl = findClient(p.client_id);
        return `<button onclick="viewPastReport('${p.id}')" class="w-full text-right p-3 border border-slate-200 rounded-lg hover:bg-sky-50 hover:border-sky-300 transition cursor-pointer block" style="background:white;">
          <div class="font-semibold text-slate-800">${escapeHtml(sv?.name || '?')}</div>
          <div class="text-xs text-slate-600">${fmtDate(p.case_date) || ''} · ${escapeHtml(cl?.name || '?')}</div>
          ${p.report?.conclusion ? `<div class="text-xs text-slate-500 mt-1" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">CONCLUSION: ${escapeHtml(String(p.report.conclusion).slice(0, 90))}${String(p.report.conclusion).length > 90 ? '…' : ''}</div>` : ''}
        </button>`;
      }).join('')}
    </div>`;
  openModal('📚 تقارير سابقة', body, null, { width: '600px' });
}

function viewPastReport(caseId) {
  const c = appData.cases.find(x => x.id === caseId);
  if (!c || !c.report) return;
  const r = c.report;
  const cl = findClient(c.client_id);
  const sv = findService(c.service_id);

  const sectionsHtml = (r.sections || []).map(sec => `
    <div class="mb-3">
      <div class="font-bold italic text-slate-700" style="font-family:'Times New Roman',serif">${escapeHtml(sec.heading || '')}</div>
      <div class="border border-slate-200 rounded p-2 bg-slate-50 text-sm whitespace-pre-wrap" style="font-family:'Times New Roman',serif; direction:ltr; text-align:left;">${escapeHtml(sec.content || '')}</div>
    </div>`).join('');

  const body = `
    <div class="space-y-3">
      <div class="bg-sky-50 p-3 rounded-lg text-sm border border-sky-200">
        <strong>${escapeHtml(c.patient_name)}</strong> · ${fmtDate(c.case_date)} · ${escapeHtml(cl?.name || '?')} · ${escapeHtml(sv?.name || '?')}
      </div>
      ${r.title ? `<div class="font-bold text-base text-center" style="direction:ltr;">${escapeHtml(r.title)}</div>` : ''}
      <div>${sectionsHtml}</div>
      ${r.conclusion ? `<div>
        <div class="font-bold text-slate-700">CONCLUSION:</div>
        <div class="border border-slate-200 rounded p-2 bg-amber-50 text-sm whitespace-pre-wrap" style="font-family:'Times New Roman',serif; direction:ltr; text-align:left;">${escapeHtml(r.conclusion)}</div>
      </div>` : ''}
    </div>`;
  openModal('📄 تقرير سابق (للقراءة فقط)', body, null, { width: '760px' });
}

function collectReportFromDom() {
  const title = document.getElementById('rpt-title').value;
  const conclusion = document.getElementById('rpt-conclusion').value;
  const sections = [];
  document.querySelectorAll('#rpt-sections > [data-idx]').forEach(div => {
    const heading = div.querySelector('[data-field="heading"]')?.value || '';
    const content = div.querySelector('[data-field="content"]')?.value || '';
    if (heading || content) sections.push({ heading, content });
  });
  return { title, sections, conclusion };
}

function addReportSection() {
  const container = document.getElementById('rpt-sections');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'mb-3';
  div.setAttribute('data-idx', idx);
  const ta = `<textarea class="sec-content-edit" data-field="content" rows="4" placeholder="المحتوى"></textarea>`;
  div.innerHTML = `
    <div class="flex gap-2 items-start">
      <div class="flex-1">
        <input type="text" class="sec-heading-edit" data-field="heading" placeholder="عنوان القسم">
        ${voiceWrap(ta, 'ar-EG')}
      </div>
      <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 hover:underline text-sm">حذف</button>
    </div>`;
  container.appendChild(div);
}

  if (!c) return;

  if (saveFirst) {
    const saved = collectReportFromDom();
    const { error } = await supa.from('cases').update({ report: saved }).eq('id', c.id);
    if (error) { toast('خطأ في الحفظ: ' + error.message, 'error'); return; }
    c.report = saved;
    await reloadTable('cases');
  }

  const report = c.report || {};
  const sectionsHtml = (report.sections || []).map(sec => `
    <h3 class="sec-heading">${escapeHtml(sec.heading || '')}</h3>
    <div class="sec-content">${escapeHtml(sec.content || '')}</div>`).join('');

  const safePatient = (c.patient_name || 'Report').replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_').slice(0, 50);

  const settings = appData.settings || {};
  const headerImg = settings.letterhead_header_url ? `<img src="${escapeHtml(settings.letterhead_header_url)}" style="max-width:100%; max-height:120px; margin-bottom:8px;" crossorigin="anonymous">` : '';
  const footerImg = settings.letterhead_footer_url ? `<img src="${escapeHtml(settings.letterhead_footer_url)}" style="max-width:100%; max-height:80px; margin-top:8px;" crossorigin="anonymous">` : '';
  const phone = c.patient_phone ? c.patient_phone.replace(/[^\d+]/g, '') : '';
  const waText = encodeURIComponent(`تقرير أشعة - ${c.patient_name || ''}`);

  const w = window.open('', '_blank', 'width=900,height=1100');
  w.document.write(`
<!DOCTYPE html><html lang="en" dir="ltr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report - ${escapeHtml(c.patient_name || '')}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>
<style>
  body { font-family: 'Times New Roman', Times, serif; margin: 0; padding: 0; background: #e5e7eb; color: #000; }
  #report-container { background: white; max-width: 210mm; min-height: 270mm; margin: 70px auto 20px; padding: 20mm; direction: ltr; text-align: left; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }

  .conclusion-block .content { font-size: 13px; white-space: pre-wrap; line-height: 1.6; padding-left: 8px; }
  .signature-block { margin-top: 50px; text-align: right; font-size: 13px; font-weight: bold; }
  .patient-footer { margin-top: 40px; padding-top: 10px; border-top: 1px solid #999; font-size: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  .btn-pdf { background: #16a34a; }

  #loading > div { background: white; padding: 20px 40px; border-radius: 8px; }

  @page { size: A4; margin: 15mm; }

</style></head><body>

<div class="action-bar no-print">

  <button class="btn-pdf" onclick="doDownloadPdf()">📥 تحميل PDF</button>
  <button class="btn-share" onclick="doShare()">📤 مشاركة</button>

  ${footerImg ? `<div class="footer-img">${footerImg}</div>` : ''}

<script>
  const FILENAME = ${JSON.stringify(filename)};
  const PHONE = ${JSON.stringify(phone)};
  const WA_TEXT = ${JSON.stringify(waText)};
  const pdfOptions = {
    margin: [10, 10, 10, 10], filename: FILENAME,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };
  function showLoad(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
  function doPrint() { window.print(); }
  async function doDownloadPdf() {
    showLoad(true);
    try {
      await html2pdf().set(pdfOptions).from(document.getElementById('report-container')).save();
    } catch (e) { alert('خطأ: ' + e.message); }
    finally { showLoad(false); }
  }
  async function doShare() {
    showLoad(true);
    try {
      const blob = await html2pdf().set(pdfOptions).from(document.getElementById('report-container')).outputPdf('blob');
      const file = new File([blob], FILENAME, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'تقرير أشعة' });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = FILENAME; a.click();
        URL.revokeObjectURL(url);
        alert('تم تحميل PDF — شاركه يدوياً.');
      }
    } catch (e) { if (e.name !== 'AbortError') alert('خطأ: ' + e.message); }
    finally { showLoad(false); }
  }
  function doWhatsApp() {
    const phone = PHONE.replace(/^\\+/, '');
    window.open('https://wa.me/' + phone + '?text=' + WA_TEXT, '_blank');
  }
<\/script>
</body></html>`);

  closeModal();
  if (saveFirst) { render(); }
}

  const total = sorted.reduce((s, p) => s + (Number(p.amount) || 0), 0);
  return `
    <div class="space-y-4">
      <div class="card">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-lg font-bold text-slate-800">💰 المقبوضات (${sorted.length})</h2>
          ${can('perm_add_payment') ? `<button onclick="addPayment()" class="btn btn-success">➕ إضافة مقبوض</button>` : ''}
        </div>
        <div class="text-sm text-slate-700">الإجمالي: <strong class="text-emerald-700">${fmt(total)}</strong></div>
      </div>
      <div class="card overflow-x-auto">
        ${sorted.length === 0 ? `<p class="text-slate-500 text-center py-6">لا توجد مقبوضات بعد.</p>` :
        `<table>
          <thead><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الطريقة</th><th>ملاحظات</th><th></th></tr></thead>
          <tbody>${sorted.map(p => `

function addPayment(existing = null) {
  if (appData.clients.length === 0) { toast('أضف عميل أولاً', 'warn'); return; }
  const methods = appData.payment_methods.map(m => m.name);
  const defaultMethod = methods[0] || '';
  const p = existing || { payment_date: todayISO(), client_id: '', amount: 0, method: defaultMethod, notes: '' };
  const methodsHtml = methods.length > 0
    ? `<select id="pm-method">${methods.map(m => `<option ${p.method === m ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}</select>`
    : `<div class="bg-amber-50 border border-amber-200 rounded p-2 text-xs text-amber-800">⚠️ لا توجد طرق دفع — أضف من الإعدادات → الفئات والطرق</div>
       <input type="text" id="pm-method" value="${escapeHtml(p.method || '')}" placeholder="اكتب طريقة الدفع" class="mt-2">`;
  const body = `
    <div class="space-y-3">
      <div><label>التاريخ</label><input type="date" id="pm-date" value="${p.payment_date || todayISO()}"></div>
      <div><label>العميل</label><select id="pm-client"><option value="">-- اختر --</option>${appData.clients.map(h => `<option value="${h.id}" ${h.id === p.client_id ? 'selected' : ''}>${escapeHtml(h.name)}</option>`).join('')}</select></div>
      <div><label>المبلغ (ج.م)</label><input type="number" step="0.01" min="0" id="pm-amount" value="${p.amount || ''}"></div>
      <div><label>طريقة الدفع</label>${methodsHtml}</div>
      <div><label>ملاحظات</label><textarea id="pm-notes" rows="2">${escapeHtml(p.notes || '')}</textarea></div>
    </div>`;
  openModal(existing ? 'تعديل مقبوض' : 'إضافة مقبوض', body, async () => {
    const data = {
      payment_date: document.getElementById('pm-date').value,
      client_id: document.getElementById('pm-client').value || null,
      amount: Number(document.getElementById('pm-amount').value) || 0,
      method: document.getElementById('pm-method').value || null,
      notes: document.getElementById('pm-notes').value.trim() || null,
    };
    if (!data.client_id) { toast('اختر عميل', 'error'); return false; }
    if (data.amount <= 0) { toast('المبلغ غير صحيح', 'error'); return false; }
    const { error } = existing
      ? await supa.from('payments').update(data).eq('id', existing.id)
      : await supa.from('payments').insert(data);
    if (error) { console.error('[payment] error:', error); throw error; }
    await reloadTable('payments');
    render();
    toast(existing ? 'تم التحديث ✓' : 'تم الحفظ ✓');
  });
}
function editPayment(id) { const p = appData.payments.find(x => x.id === id); if (p) addPayment(p); }
function deletePayment(id) {
  confirmAction('حذف هذا المقبوض؟', async () => {
    const { error } = await supa.from('payments').delete().eq('id', id);
    if (error) throw error;
    await reloadTable('payments');
    render();
    toast('تم الحذف ✓');
  });
}

  return `

function generateStatement() {
  const clientId = document.getElementById('stmt-client').value;
  const from = document.getElementById('stmt-from').value;
  const to = document.getElementById('stmt-to').value;
  const out = document.getElementById('stmt-output');
  if (!clientId) { out.innerHTML = ''; return; }

  const h = findClient(clientId);
  if (!h) { out.innerHTML = ''; return; }

  const { opening, earned, paid, due, cases, payments } = clientDue(clientId, from || null, to || null, !(from || to));
  const cashInfo = clientCashDirect(clientId, from || null, to || null);

  // Build a unified ledger of transactions for professional accounting view
  const ledger = [];
  if (opening > 0 && !from && !to) {
    ledger.push({ date: '0001-01-01', desc: 'رصيد أول مدة', earned: opening, paid: 0, sortKey: 0 });
  }
  cases.forEach(c => {
    ledger.push({
      date: c.case_date,
      desc: `حالة: ${c.patient_name || ''} — ${findService(c.service_id)?.name || ''}`,
      earned: caseAmount(c),
      paid: 0,
      sortKey: 1,
    });
  });
  payments.forEach(p => {
    ledger.push({
      date: p.payment_date,
      desc: `دفعة: ${p.method || ''}${p.notes ? ' — ' + p.notes : ''}`,
      earned: 0,
      paid: Number(p.amount) || 0,
      sortKey: 2,
    });
  });
  ledger.sort((a, b) => (a.date || '').localeCompare(b.date || '') || a.sortKey - b.sortKey);

  // Compute running balance
  let running = 0;
  ledger.forEach(row => { running = running + row.earned - row.paid; row.balance = running; });

  const settings = appData.settings || {};
  const headerImg = settings.letterhead_header_url ? `<img src="${escapeHtml(settings.letterhead_header_url)}" style="max-width:100%; max-height:120px; margin-bottom:8px;" crossorigin="anonymous">` : '';

  out.innerHTML = `
    <div class="card space-y-4" id="stmt-doc" style="background:white;">
      ${headerImg ? `<div class="text-center">${headerImg}</div>` : `
        <div class="text-center pb-3 border-b-2 border-slate-300">
          <h1 class="text-2xl font-extrabold text-slate-900">${escapeHtml(settings.clinic_name || 'مدير حالات د. أحمد علي')}</h1>
          ${settings.doctor_name ? `<p class="text-sm text-slate-600 mt-1">د. ${escapeHtml(settings.doctor_name)}</p>` : ''}
          ${settings.address ? `<p class="text-xs text-slate-500">${escapeHtml(settings.address)}</p>` : ''}
          ${settings.phone ? `<p class="text-xs text-slate-500">📞 ${escapeHtml(settings.phone)}</p>` : ''}
        </div>
      `}

      <div class="text-center bg-sky-50 py-3 rounded-lg border border-sky-200">
        <h2 class="text-xl font-bold text-sky-900">كشف حساب — ${escapeHtml(h.name)}</h2>
        <p class="text-sm text-slate-600 mt-1">${from ? 'من ' + fmtDate(from) : 'من البداية'} — ${to ? 'إلى ' + fmtDate(to) : 'حتى ' + fmtDate(todayISO())}</p>
        <p class="text-xs text-slate-400 mt-1">تاريخ الإصدار: ${fmtDate(todayISO())}</p>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="text-center p-3 bg-slate-50 rounded-lg border border-slate-200">
          <div class="text-xs text-slate-600 font-semibold">رصيد أول مدة</div>
          <div class="text-lg font-bold text-slate-800">${fmt(opening)}</div>
        </div>
        <div class="text-center p-3 bg-sky-50 rounded-lg border border-sky-200">
          <div class="text-xs text-slate-600 font-semibold">قيمة الحالات</div>
          <div class="text-lg font-bold text-sky-700">${fmt(earned)}</div>
        </div>
        <div class="text-center p-3 bg-emerald-50 rounded-lg border border-emerald-200">
          <div class="text-xs text-slate-600 font-semibold">المحصَّل</div>
          <div class="text-lg font-bold text-emerald-700">${fmt(paid)}</div>
        </div>
        <div class="text-center p-3 ${due > 0 ? 'bg-red-50 border-red-200' : 'bg-emerald-50 border-emerald-200'} rounded-lg border">
          <div class="text-xs text-slate-600 font-semibold">الرصيد المتبقي</div>
          <div class="text-lg font-bold ${due > 0 ? 'text-red-700' : 'text-emerald-700'}">${fmt(due)}</div>
        </div>
      </div>

      ${cashInfo.amount > 0 ? `
        <div class="text-center p-3 bg-emerald-50 rounded-lg border border-emerald-200">
          <span class="text-xs text-slate-700">💵 دخل كاش مباشر (خارج حساب العميل): </span>
          <span class="font-bold text-emerald-700">${fmt(cashInfo.amount)}</span>
          <span class="text-xs text-slate-500"> · ${cashInfo.cases.length} حالة</span>
        </div>
      ` : ''}

      <div>
        <h3 class="font-bold mb-2 text-slate-800">📊 سجل الحساب التفصيلي</h3>
        ${ledger.length === 0 ? '<p class="text-slate-500 text-sm py-4">لا توجد حركات في الفترة</p>' :
        `<div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr style="background:#0c4a6e; color:white;">
                <th class="text-white">التاريخ</th>
                <th class="text-white">البيان</th>
                <th class="text-white text-center">قيمة الحالة</th>
                <th class="text-white text-center">المدفوع</th>
                <th class="text-white text-center">الرصيد</th>
              </tr>
            </thead>
            <tbody>
              ${ledger.map(row => `
                <tr>
                  <td class="text-xs">${row.sortKey === 0 ? '—' : fmtDate(row.date)}</td>
                  <td>${escapeHtml(row.desc)}</td>
                  <td class="text-center ${row.earned > 0 ? 'text-sky-700 font-bold' : 'text-slate-300'}">${row.earned > 0 ? fmt(row.earned) : '—'}</td>
                  <td class="text-center ${row.paid > 0 ? 'text-emerald-700 font-bold' : 'text-slate-300'}">${row.paid > 0 ? fmt(row.paid) : '—'}</td>
                  <td class="text-center font-bold ${row.balance > 0 ? 'text-red-700' : 'text-emerald-700'}">${fmt(row.balance)}</td>
                </tr>
              `).join('')}
              <tr style="background:#f1f5f9; font-weight:bold;">
                <td colspan="2" class="text-left">الإجمالي</td>
                <td class="text-center text-sky-700">${fmt(opening + earned)}</td>
                <td class="text-center text-emerald-700">${fmt(paid)}</td>
                <td class="text-center ${due > 0 ? 'text-red-700' : 'text-emerald-700'}">${fmt(due)}</td>
              </tr>
            </tbody>
          </table>
        </div>`}
      </div>

      ${cashInfo.cases.length > 0 ? `
        <div>
          <h3 class="font-bold mb-2 text-slate-800">💵 حالات الكاش المباشر (للعلم فقط)</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr><th>التاريخ</th><th>المريض</th><th>الخدمة</th><th class="text-center">القيمة</th></tr></thead>
              <tbody>
                ${cashInfo.cases.map(c => `<tr><td>${fmtDate(c.case_date)}</td><td>${escapeHtml(c.patient_name || '')}</td><td>${escapeHtml(findService(c.service_id)?.name || '?')}</td><td class="text-center font-bold">${fmt(caseAmount(c))}</td></tr>`).join('')}
                <tr style="background:#f1f5f9; font-weight:bold;"><td colspan="3" class="text-left">الإجمالي</td><td class="text-center">${fmt(cashInfo.amount)}</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      ` : ''}

      <div class="text-center text-xs text-slate-400 pt-4 border-t border-slate-200">
        كشف حساب صادر من نظام إدارة العيادة — ${fmtDate(todayISO())}
      </div>
    </div>`;
}

async function downloadStatementPdf() {
  const el = document.getElementById('stmt-doc');
  if (!el) { toast('اختر عميل أولاً', 'warn'); return; }

  // Lazy-load html2pdf
  if (!window.html2pdf) {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    document.head.appendChild(s);
    await new Promise(res => s.onload = res);
  }

  showLoading(true);
  try {
    const clientName = document.querySelector('#stmt-client option:checked')?.textContent || 'statement';
    const filename = `Statement_${clientName.replace(/\s+/g, '_')}_${todayISO()}.pdf`;
    await html2pdf().set({
      margin: [10, 10, 10, 10], filename,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(el).save();
    toast('تم تحميل PDF ✓');
  } catch (e) { toast('خطأ: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>`;
}

function renderClientsCharts() {
  const stats = appData.clients.map(h => {
    const cases = appData.cases.filter(c => c.client_id === h.id);
    const total = cases.reduce((s, c) => s + caseAmount(c), 0);
    return { name: h.name, total, count: cases.length };
  }).sort((a, b) => b.total - a.total).slice(0, 10);

  const ctx1 = document.getElementById('chart-top-clients');
  if (ctx1) {
    chartInstances.topClients = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: stats.map(s => s.name),
        datasets: [{ label: 'الإيراد (ج.م)', data: stats.map(s => s.total), backgroundColor: '#0ea5e9', borderRadius: 6 }]
      },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  const ctx2 = document.getElementById('chart-clients-cases');
  if (ctx2) {
    chartInstances.clientsCases = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: stats.map(s => s.name),
        datasets: [{ label: 'عدد الحالات', data: stats.map(s => s.count), backgroundColor: '#10b981', borderRadius: 6 }]
      },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}

async function saveMyProfile() {
  const name = document.getElementById('me-name').value.trim();
  if (!name) { toast('الاسم مطلوب', 'error'); return; }
  const { error } = await supa.from('profiles').update({ full_name: name }).eq('id', profile.id);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  profile.full_name = name;
  applyAppBranding();
  toast('تم الحفظ ✓');
}

async function changeMyPassword() {
  const p1 = document.getElementById('me-pwd1').value;
  const p2 = document.getElementById('me-pwd2').value;
  if (p1.length < 6) { toast('كلمة المرور يجب 6 أحرف على الأقل', 'error'); return; }
  if (p1 !== p2) { toast('كلمتا المرور غير متطابقتين', 'error'); return; }
  const { error } = await supa.auth.updateUser({ password: p1 });
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  document.getElementById('me-pwd1').value = '';
  document.getElementById('me-pwd2').value = '';
  toast('تم تحديث كلمة المرور ✓');
}

        </tbody>

async function updatePrice(id, field, value) {
  const update = { [field]: Number(value) || 0 };
  const { error } = await supa.from('prices').update(update).eq('id', id);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  // Update local cache
  const p = appData.prices.find(x => x.id === id);
  if (p) p[field] = update[field];
}

function bulkEditPrices(clientId) {
  const h = findClient(clientId);
  if (!h) return;
  const body = `
    <div class="space-y-3">
      <p class="text-sm text-slate-700">القيم هتتطبق على <strong>كل الخدمات</strong> في <strong>${escapeHtml(h.name)}</strong>. اترك الحقل فارغاً لعدم التغيير.</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div><label>سعر مصري</label><input type="number" step="0.01" id="b-pe"></div>
        <div><label>سعر أجنبي</label><input type="number" step="0.01" id="b-pf"></div>
        <div><label>سعر مقيم</label><input type="number" step="0.01" id="b-pr"></div>
      </div>
    </div>`;
  openModal('⚡ تعديل جماعي', body, async () => {
    const pe = document.getElementById('b-pe').value;
    const pf = document.getElementById('b-pf').value;
    const pr = document.getElementById('b-pr').value;
    const update = {};
    if (pe !== '') update.price_egyptian = Number(pe) || 0;
    if (pf !== '') update.price_foreign = Number(pf) || 0;
    if (pr !== '') update.price_resident = Number(pr) || 0;
    if (Object.keys(update).length === 0) { toast('لم تدخل أي قيمة', 'warn'); return false; }
    const { error } = await supa.from('prices').update(update).eq('client_id', clientId);
    if (error) throw error;
    await reloadTable('prices');
    render();
    toast('تم التحديث ✓');
  });
}

function editTemplate(serviceId) {
  const s = findService(serviceId);
  if (!s) return;
  const t = s.template || { title: '', sections: [], conclusion: '' };
  const sectionsHtml = (t.sections || []).map((sec, i) => `
    <div class="mb-3 p-3 border border-slate-200 rounded-lg" data-idx="${i}">
      <div class="flex justify-between items-center mb-2 gap-2">
        <input type="text" class="sec-heading-edit" data-field="heading" value="${escapeHtml(sec.heading || '')}" style="flex:1">
        <button type="button" onclick="this.closest('[data-idx]').remove()" class="text-red-600 text-sm">حذف</button>
      </div>
      <textarea class="sec-content-edit" data-field="content" rows="5">${escapeHtml(sec.content || '')}</textarea>
    </div>`).join('');

  const body = `
    <div class="report-edit space-y-3">
      <div><label>عنوان التقرير</label><input type="text" id="tpl-title" value="${escapeHtml(t.title || '')}" style="direction:ltr; text-align:left; font-weight:bold"></div>
      <div>
        <label>الأقسام</label>
        <div id="tpl-sections">${sectionsHtml}</div>
        <button type="button" onclick="addTplSection()" class="btn btn-secondary mt-2">➕ إضافة قسم</button>
      </div>
      <div><label>CONCLUSION</label><textarea id="tpl-conclusion" rows="4" style="direction:ltr; text-align:left; font-family:'Times New Roman',serif">${escapeHtml(t.conclusion || '')}</textarea></div>
    </div>`;
  openModal(`تعديل قالب: ${s.name}`, body, async () => {
    const sections = [];
    document.querySelectorAll('#tpl-sections > [data-idx]').forEach(div => {
      const heading = div.querySelector('[data-field="heading"]')?.value || '';
      const content = div.querySelector('[data-field="content"]')?.value || '';
      if (heading || content) sections.push({ heading, content });
    });

function addUser(existing = null) {
  if (!existing) {
    // New user — create via signUp
    const body = `
      <div class="space-y-3">
        <div class="bg-sky-50 border border-sky-200 rounded p-3 text-sm text-slate-700">
          هتنشئ المستخدم بـ بريد + باسورد. هيقدر يدخل البرنامج فوراً ويغيّر الباسورد من بياناته.
        </div>
        <div><label>الاسم *</label><input type="text" id="nu-name"></div>
        <div><label>البريد الإلكتروني *</label><input type="email" id="nu-email" dir="ltr"></div>
        <div><label>كلمة المرور المؤقتة *</label><input type="text" id="nu-password" placeholder="6 أحرف على الأقل"></div>
        <div><label>الدور</label>
          <select id="nu-role">
            ${Object.keys(ROLE_LABELS).filter(k => k !== 'owner').map(k => `<option value="${k}">${ROLE_LABELS[k]}</option>`).join('')}
          </select>
        </div>
        <div id="nu-client-wrap" style="display:none;">
          <label>اربط بعميل (لـ Client Portal)</label>
          <select id="nu-client">
            <option value="">-- اختر العميل --</option>
            ${appData.clients.map(h => `<option value="${h.id}">${escapeHtml(h.name)}</option>`).join('')}
          </select>
        </div>
      </div>`;
    openModal('➕ إضافة مستخدم جديد', body, async () => {
      const name = document.getElementById('nu-name').value.trim();
      const email = document.getElementById('nu-email').value.trim();
      const password = document.getElementById('nu-password').value;
      const role = document.getElementById('nu-role').value;
      const linkedClient = document.getElementById('nu-client').value || null;

      if (!name || !email || password.length < 6) { toast('املأ كل الحقول (الباسورد 6 أحرف+)', 'error'); return false; }
      if (role === 'client' && !linkedClient) { toast('اختر العميل المرتبط', 'error'); return false; }

      try {
        // Use a temporary client so admin's session isn't affected
        const tempClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: false, autoRefreshToken: false, storage: { getItem: () => null, setItem: () => {}, removeItem: () => {} } }
        });
        console.log('[addUser] Signing up:', email);
        const { data, error } = await tempClient.auth.signUp({ email, password, options: { data: { full_name: name } } });
        if (error) { console.error('[addUser] signUp error:', error); throw error; }
        if (!data.user) { toast('فشل إنشاء المستخدم', 'error'); return false; }

        // Wait for trigger to complete profile creation
        console.log('[addUser] Waiting for profile trigger...');
        await new Promise(r => setTimeout(r, 1000));

        // UPSERT — handles both cases: trigger ran, or didn't
        // Use 'custom' as safe role value (works across all DB versions);
        // client portal is identified by linked_client_id, not role string.
        const SAFE_ROLES = ['owner','doctor','secretary','accountant','custom'];
        const safeRole = SAFE_ROLES.includes(role) ? role : 'custom';
        const profileData = {
          id: data.user.id,
          email,
          full_name: name,
          role: safeRole,
          active: true,
          linked_client_id: linkedClient,
          ...ROLE_PRESETS[role],
        };
        console.log('[addUser] Upserting profile:', profileData);
        const { error: upErr } = await supa.from('profiles').upsert(profileData, { onConflict: 'id' });
        if (upErr) { console.error('[addUser] upsert error:', upErr); throw upErr; }

        await reloadTable('profiles');
        render();
        toast('تم إنشاء المستخدم ✓');
      } catch (e) {
        const detail = e.details || e.hint || e.code || '';
        console.error('[addUser] FAILED:', e);
        toast('خطأ: ' + (e.message || 'unknown') + (detail ? ' (' + detail + ')' : ''), 'error');
        return false;
      }
    }, { width: '600px' });

    // Toggle client field based on role
    setTimeout(() => {
      const roleSel = document.getElementById('nu-role');
      const clientWrap = document.getElementById('nu-client-wrap');
      const update = () => clientWrap.style.display = roleSel.value === 'client' ? 'block' : 'none';
      roleSel.addEventListener('change', update);
      update();
    }, 50);
    return;
  }

  // Edit existing user — show permission editor
  editUser(existing.id);
}

function editUser(userId) {
  const u = appData.profiles.find(x => x.id === userId);
  if (!u) return;
  const isMe = u.id === profile.id;

  const permsHtml = PERM_GROUPS.map(g => `
    <div class="mb-3">
      <div class="font-semibold text-sm text-slate-700 mb-2">${g.label}</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        ${g.perms.map(p => `
          <label class="perm-toggle">
            <input type="checkbox" data-perm="${p}" ${u[p] ? 'checked' : ''}>
            <span>${PERM_LABELS[p] || p}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `).join('');

  const body = `
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label>الاسم</label><input type="text" id="eu-name" value="${escapeHtml(u.full_name)}"></div>
        <div><label>البريد</label><input type="email" value="${escapeHtml(u.email || '')}" disabled style="background:#f1f5f9;"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label>الدور (preset)</label>
          <select id="eu-role" onchange="applyRolePreset('${userId}', this.value)" ${isMe ? 'disabled' : ''}>
            ${Object.keys(ROLE_LABELS).map(k => `<option value="${k}" ${k === u.role ? 'selected' : ''}>${ROLE_LABELS[k]}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>اربط بعميل (Client Portal)</label>
          <select id="eu-client" ${isMe ? 'disabled' : ''}>
            <option value="">— لا (مستخدم داخلي) —</option>
            ${appData.clients.map(h => `<option value="${h.id}" ${h.id === u.linked_client_id ? 'selected' : ''}>${escapeHtml(h.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="flex items-center gap-4 text-sm py-2 border-y border-slate-200">
        <label class="flex items-center gap-2 m-0"><input type="checkbox" id="eu-active" ${u.active !== false ? 'checked' : ''} ${isMe ? 'disabled' : ''}> نشط</label>
        ${profile.is_admin && !isMe ? `<label class="flex items-center gap-2 m-0"><input type="checkbox" id="eu-admin" ${u.is_admin ? 'checked' : ''}> 👑 مالك (Admin — كل الصلاحيات)</label>` : ''}
        ${u.is_admin ? '<span class="badge badge-purple">👑 مالك</span>' : ''}
      </div>
      <div>
        <h4 class="font-bold text-slate-800 mt-2 mb-3">🔐 الصلاحيات التفصيلية</h4>
        <div id="eu-perms">${permsHtml}</div>
      </div>
      ${profile.is_admin && !isMe ? `
        <div class="pt-3 border-t border-slate-200">
          <button onclick="deleteUser('${userId}')" class="btn btn-danger btn-sm">🗑️ حذف هذا المستخدم</button>
        </div>
      ` : ''}
    </div>`;
  openModal(`تعديل: ${u.full_name}`, body, async () => {
    const updates = {
      full_name: document.getElementById('eu-name').value.trim(),
    };
    if (!isMe) {
      const SAFE_ROLES = ['owner','doctor','secretary','accountant','custom'];
      const chosenRole = document.getElementById('eu-role').value;
      updates.role = SAFE_ROLES.includes(chosenRole) ? chosenRole : 'custom';
      updates.linked_client_id = document.getElementById('eu-client').value || null;
      updates.active = document.getElementById('eu-active').checked;
      if (profile.is_admin) {
        const adminCheck = document.getElementById('eu-admin');
        if (adminCheck) updates.is_admin = adminCheck.checked;
      }
      // Collect granular permissions
      document.querySelectorAll('#eu-perms input[data-perm]').forEach(cb => {
        updates[cb.dataset.perm] = cb.checked;
      });
    }
    const { error } = await supa.from('profiles').update(updates).eq('id', userId);
    if (error) throw error;
    await reloadTable('profiles');
    if (userId === profile.id) await loadProfile();
    render();
    toast('تم التحديث ✓');
  }, { width: '850px' });
}

function applyRolePreset(userId, role) {
  const preset = ROLE_PRESETS[role] || {};
  document.querySelectorAll('#eu-perms input[data-perm]').forEach(cb => {
    cb.checked = !!preset[cb.dataset.perm];
  });
}

function deleteUser(userId) {
  confirmAction('حذف المستخدم نهائياً؟ (الـ auth user يبقى موجود في Supabase Auth — لازم تحذفه يدوياً من هناك)', async () => {
    const { error } = await supa.from('profiles').delete().eq('id', userId);

    await reloadTable('profiles');

    toast('تم حذف الـ profile ✓ — احذف auth user من Supabase Dashboard', 'warn');
  });
}

            <label>Footer (أسفل الصفحة)</label>

    </div>`;
}

async function saveAppSettings() {
  const updates = {
    clinic_name: document.getElementById('as-clinic').value.trim() || null,
    doctor_name: document.getElementById('as-doctor').value.trim() || null,
    address: document.getElementById('as-address').value.trim() || null,
    phone: document.getElementById('as-phone').value.trim() || null,
  };
  const { error } = await supa.from('app_settings').update(updates).eq('id', 1);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  Object.assign(appData.settings, updates);
  applyAppBranding();
  toast('تم الحفظ ✓');
}

async function saveLoginSettings() {
  const updates = {
    login_title: document.getElementById('as-logintitle').value.trim() || null,
    login_subtitle: document.getElementById('as-loginsub').value.trim() || null,
  };
  const { error } = await supa.from('app_settings').update(updates).eq('id', 1);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  Object.assign(appData.settings, updates);
  toast('تم الحفظ ✓');
}

function buildPublicUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/branding/${path}`;
}

async function uploadLoginBg(event) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading(true);
  try {
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    const path = `login-bg-${Date.now()}.${ext}`;
    console.log('[upload] uploading to:', path);
    const { error: upErr } = await supa.storage.from('branding').upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) { console.error('[upload] storage error:', upErr); throw upErr; }
    const publicUrl = buildPublicUrl(path);
    console.log('[upload] public URL:', publicUrl);
    const { error } = await supa.from('app_settings').update({ login_bg_url: publicUrl }).eq('id', 1);
    if (error) { console.error('[upload] db error:', error); throw error; }
    appData.settings.login_bg_url = publicUrl;
    render();
    toast('تم رفع الصورة ✓');
  } catch (e) { toast('خطأ: ' + (e.message || JSON.stringify(e)), 'error'); }
  finally { showLoading(false); event.target.value = ''; }
}

async function uploadLetterhead(event, kind) {
  const file = event.target.files[0];
  if (!file) return;
  showLoading(true);
  try {
    const ext = (file.name.split('.').pop() || 'png').toLowerCase();
    const path = `letterhead-${kind}-${Date.now()}.${ext}`;
    const { error: upErr } = await supa.storage.from('branding').upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) throw upErr;
    const publicUrl = buildPublicUrl(path);
    const field = kind === 'header' ? 'letterhead_header_url' : 'letterhead_footer_url';
    const { error } = await supa.from('app_settings').update({ [field]: publicUrl }).eq('id', 1);
    if (error) throw error;
    appData.settings[field] = publicUrl;
    render();
    toast('تم رفع الصورة ✓');
  } catch (e) { toast('خطأ: ' + (e.message || JSON.stringify(e)), 'error'); }
  finally { showLoading(false); event.target.value = ''; }
}

async function clearLetterhead(kind) {
  const field = kind === 'header' ? 'letterhead_header_url' : 'letterhead_footer_url';
  const { error } = await supa.from('app_settings').update({ [field]: null }).eq('id', 1);
  if (error) { toast('خطأ: ' + error.message, 'error'); return; }
  appData.settings[field] = null;
  render();
  toast('تم الحذف ✓');
}

async function exportBackup() {
  showLoading(true);
  try {
    const data = {
      version: 'v4-supabase',
      exported_at: new Date().toISOString(),
      clients: appData.clients, services: appData.services, prices: appData.prices,
      cases: appData.cases, payments: appData.payments, expenses: appData.expenses,
      profiles: appData.profiles.map(p => { const { id, ...rest } = p; return { ...rest, _legacy_id: id }; }),
      settings: appData.settings,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `radiology-backup-${todayISO()}.json`; a.click();
    URL.revokeObjectURL(url);
    toast('تم التصدير ✓');
  } catch (e) { toast('خطأ: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

//==============================================================
// PWA — Service Worker Registration + Update Detection
//==============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');
      console.log('[PWA] Service worker registered');

      // Check for updates every 60 seconds while app is open
      setInterval(() => reg.update().catch(() => {}), 60000);

      // Detect when a new service worker is installed
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });

      // When the new SW takes control, reload to use it
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    } catch (e) {
      console.warn('[PWA] SW registration failed:', e);
    }
  });
}

function showUpdateBanner() {
  if (document.getElementById('update-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;padding:14px 24px;border-radius:12px;z-index:9999;box-shadow:0 8px 32px rgba(14,165,233,0.4);display:flex;align-items:center;gap:12px;font-family:Cairo,sans-serif;animation:slideUp 0.4s ease;';
  banner.innerHTML = `
    <span style="font-size:20px">🎉</span>
    <span style="font-weight:600">يتوفّر تحديث جديد!</span>
    <button onclick="applyUpdate()" style="background:white;color:#0284c7;border:none;padding:8px 16px;border-radius:8px;font-weight:bold;cursor:pointer;font-family:inherit">تحديث الآن</button>
    <button onclick="document.getElementById('update-banner').remove()" style="background:transparent;color:white;border:1px solid rgba(255,255,255,0.5);padding:6px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px">لاحقاً</button>
  `;
  // Add animation keyframes
  if (!document.getElementById('update-banner-style')) {
    const s = document.createElement('style');
    s.id = 'update-banner-style';
    s.textContent = '@keyframes slideUp { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }';
    document.head.appendChild(s);
  }
  document.body.appendChild(banner);
}

async function applyUpdate() {
  const reg = await navigator.serviceWorker.getRegistration();
  if (reg && reg.waiting) {
    reg.waiting.postMessage('SKIP_WAITING');
  } else {
    window.location.reload();
  }
}

async function forceUpdate() {
  if (!confirm('هيتم مسح كاش البرنامج وتحميل أحدث نسخة. متابعة؟')) return;
  toast('جارٍ تحديث البرنامج...', 'info');
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
  } catch (e) { console.warn(e); }
  setTimeout(() => {
    // Force reload from server (bypass cache)
    window.location.href = window.location.pathname + '?v=' + Date.now();
  }, 600);
}
